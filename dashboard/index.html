<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Company Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--panel:#111827;--card:#1e293b;--border:#1e3a5f;--text:#e0e0e0;--dim:#64748b;--accent:#3b82f6;--green:#00ff88;--yellow:#fbbf24;--red:#ef4444}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:5px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.hdr h1{font-size:14px;white-space:nowrap}.hdr h1 span{color:#7b68ee}
.tabs{display:flex;gap:4px;flex:1;overflow-x:auto;margin:0 8px}
.tab{background:var(--card);border:1px solid transparent;border-radius:6px;padding:4px 10px;font-size:11px;color:var(--dim);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:#1e3a5f;border-color:var(--accent);color:white}
.tab .x{margin-left:4px;cursor:pointer;color:var(--dim);font-size:9px}
.hdr-stats{font-size:9px;color:var(--dim)}
.hdr-btn{background:var(--card);border:1px solid #374151;border-radius:4px;padding:2px 6px;font-size:9px;color:var(--dim);cursor:pointer;text-decoration:none}
.hdr-btn:hover{border-color:var(--accent);color:var(--text)}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer}

/* Banner */
.banner{background:#1a1500;border-bottom:1px solid #332200;padding:4px 16px;display:none;align-items:center;gap:8px;font-size:10px;color:#fbbf24;flex-shrink:0}
.banner.show{display:flex}
.banner button{border:1px solid #92400e;border-radius:3px;padding:2px 6px;font-size:9px;cursor:pointer;background:transparent;color:#fbbf24}

/* Narrative Panel */
.narrative-panel{background:linear-gradient(135deg,#111827ee,#1a1a2eee);border:1px solid var(--border);border-radius:8px;
  position:absolute;top:8px;left:12px;right:12px;z-index:10;display:none;overflow:hidden;
  backdrop-filter:blur(8px);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.narrative-header{display:flex;align-items:center;gap:6px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;color:#fbbf24;user-select:none}
.narrative-header:hover{background:rgba(251,191,36,.05)}
.narrative-toggle{font-size:9px;color:var(--dim);transition:transform .2s}
.narrative-panel.open .narrative-toggle{transform:rotate(90deg)}
.narrative-body{max-height:0;overflow:hidden;transition:max-height .3s ease}
.narrative-panel.open .narrative-body{max-height:130px;overflow-y:auto}
.narrative-event{display:flex;align-items:flex-start;gap:6px;padding:4px 12px;font-size:11px;line-height:1.5;border-top:1px solid rgba(30,58,95,.4)}
.narrative-event .ne-icon{flex-shrink:0;width:16px;text-align:center}
.narrative-event .ne-text{flex:1;color:var(--text)}
.narrative-event .ne-time{flex-shrink:0;font-size:9px;color:var(--dim);min-width:36px;text-align:right}
.narrative-event.warning{background:rgba(251,191,36,.08)}
.narrative-event.warning .ne-text{color:#fbbf24}
.narrative-event.done .ne-text{color:var(--green)}
.narrative-event.approval .ne-text{color:#f59e0b}
.narrative-event.milestone .ne-text{color:#a78bfa}
.narrative-empty{padding:8px 12px;font-size:11px;color:var(--dim);text-align:center}

/* Fog of War Map */
.fog-map{flex:1;overflow:auto;position:relative;background:var(--bg);cursor:grab}
.fog-map:active{cursor:grabbing}
.map-zoom-ctrl{position:absolute;bottom:12px;left:12px;z-index:10;display:flex;gap:4px}
.map-zoom-ctrl button{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.map-zoom-ctrl button:hover{background:var(--card);border-color:var(--accent)}
.map-zoom-ctrl span{font-size:9px;color:var(--dim);line-height:28px;padding:0 4px}
.fog-map::before{content:'';position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(30,58,95,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(30,58,95,.12) 1px,transparent 1px);
  background-size:40px 40px;z-index:0}
.map-grid{display:grid;gap:6px;padding:24px;position:relative;z-index:1;transform-origin:center center;transition:transform .2s ease;
  justify-content:center;margin:0 auto;min-height:100%}
.map-block{width:120px;height:90px;border-radius:10px;position:relative;cursor:default;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  transition:all .4s ease;font-size:11px;overflow:hidden;border:1.5px solid transparent}
.map-block.working,.map-block.thinking{width:140px;height:110px;z-index:2}

/* Fog state */
.map-block.fog{background:rgba(15,23,42,.7);border-color:rgba(30,58,95,.2);opacity:.18;cursor:default}
.map-block.fog::after{content:'';position:absolute;inset:0;border-radius:10px;
  background:linear-gradient(135deg,rgba(100,116,139,.08),transparent,rgba(100,116,139,.06));
  animation:fogShimmer 6s ease-in-out infinite alternate}
@keyframes fogShimmer{0%{opacity:.3}50%{opacity:.7}100%{opacity:.4}}

/* Hazy state */
.map-block.hazy{background:rgba(30,41,59,.6);border-color:rgba(51,65,85,.5);opacity:.55;cursor:default}
.map-block.hazy .block-title{opacity:.6}
.map-block.hazy::after{content:'';position:absolute;inset:0;border-radius:10px;
  background:radial-gradient(ellipse at center,rgba(100,116,139,.1),transparent);
  animation:hazyPulse 3s ease-in-out infinite}
@keyframes hazyPulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* Working/Pulsing state */
.map-block.working{background:rgba(30,41,59,.95);opacity:1;cursor:pointer;
  border-width:2px;animation:workingPulse 1.5s ease-in-out infinite;position:relative;overflow:visible}
.map-block.working::after{content:'';position:absolute;inset:-4px;border-radius:14px;
  border:2px dashed rgba(59,130,246,.5);animation:workingSpin 8s linear infinite}
.map-block.working .block-title{color:#f1f5f9;font-weight:700;font-size:11px}
.map-block.working .block-speech{font-size:8px;color:#94a3b8;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px}
@keyframes workingPulse{0%,100%{box-shadow:0 0 10px rgba(59,130,246,.3),inset 0 0 15px rgba(59,130,246,.05)}50%{box-shadow:0 0 30px rgba(59,130,246,.6),inset 0 0 25px rgba(59,130,246,.1)}}
@keyframes workingSpin{to{transform:rotate(360deg)}}

/* Thinking state (agent is actively processing) */
.map-block.thinking{background:rgba(30,41,59,.95);opacity:1;cursor:pointer;
  border-width:2px;border-color:rgba(251,191,36,.7)!important;animation:thinkingGlow 1s ease-in-out infinite;position:relative;overflow:visible}
.map-block.thinking::after{content:'⚡';position:absolute;top:-8px;right:-8px;font-size:16px;
  animation:thinkingBolt .8s ease-in-out infinite;z-index:3}
.map-block.thinking .block-title{color:#fbbf24;font-weight:700}
@keyframes thinkingGlow{0%,100%{box-shadow:0 0 15px rgba(251,191,36,.3)}50%{box-shadow:0 0 40px rgba(251,191,36,.7),0 0 60px rgba(251,191,36,.2)}}
@keyframes thinkingBolt{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.5}}

/* Done/Bright state */
.map-block.done{background:rgba(30,41,59,.95);opacity:1;cursor:pointer;
  border-color:rgba(34,197,94,.45);box-shadow:0 0 12px rgba(34,197,94,.15)}
.map-block.done:hover{box-shadow:0 0 24px rgba(34,197,94,.3);transform:translateY(-2px)}
.map-block.done .block-title{color:#f1f5f9;font-weight:700}

/* Blocked/Error state */
.map-block.blocked{background:rgba(30,41,59,.85);opacity:1;cursor:pointer;
  border-color:rgba(239,68,68,.6);animation:blockedGlow 1.5s ease-in-out infinite}
@keyframes blockedGlow{0%,100%{box-shadow:0 0 8px rgba(239,68,68,.2)}50%{box-shadow:0 0 18px rgba(239,68,68,.45)}}

/* HQ Block */
.map-block.hq{background:linear-gradient(135deg,#1e293b,#1a1a2e);border-color:rgba(123,104,238,.5);
  box-shadow:0 0 20px rgba(123,104,238,.2);opacity:1;cursor:default;width:140px;height:100px}
.map-block.hq .block-title{font-size:13px;font-weight:700;color:#e0e7ff}
.map-block.hq .block-sub{font-size:9px;color:#a5b4fc}

/* Quadrant tints */
.map-block.q-dev{border-color:rgba(59,130,246,.35)}
.map-block.q-dev.working{border-color:rgba(59,130,246,.7)}
.map-block.q-plan{border-color:rgba(139,92,246,.35)}
.map-block.q-plan.working{border-color:rgba(139,92,246,.7)}
.map-block.q-market{border-color:rgba(34,197,94,.35)}
.map-block.q-market.working{border-color:rgba(34,197,94,.7)}
.map-block.q-design{border-color:rgba(236,72,153,.35)}
.map-block.q-design.working{border-color:rgba(236,72,153,.7)}

/* Quadrant background tints for non-fog */
.map-block.q-dev:not(.fog){background-image:linear-gradient(135deg,rgba(59,130,246,.08),transparent)}
.map-block.q-plan:not(.fog){background-image:linear-gradient(135deg,rgba(139,92,246,.08),transparent)}
.map-block.q-market:not(.fog){background-image:linear-gradient(135deg,rgba(34,197,94,.08),transparent)}
.map-block.q-design:not(.fog){background-image:linear-gradient(135deg,rgba(236,72,153,.08),transparent)}

/* Block contents */
.block-icon{font-size:16px}
.block-title{font-size:10px;color:#94a3b8;text-align:center;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.block-sub{font-size:8px;color:var(--dim)}
.block-agent{position:absolute;top:4px;right:4px;font-size:14px;
  filter:drop-shadow(0 0 3px rgba(0,0,0,.5));z-index:2;animation:agentFloat 3s ease-in-out infinite}
@keyframes agentFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.block-result{font-size:8px;color:var(--green);margin-top:2px;cursor:pointer}
.block-result:hover{text-decoration:underline}
.block-progress{width:70%;height:3px;background:#1e293b;border-radius:2px;overflow:hidden;margin-top:3px}
.block-progress-fill{height:100%;border-radius:2px;transition:width .4s}
@keyframes progressPulse{0%,100%{opacity:1}50%{opacity:.4}}

/* Quadrant labels */
.quadrant-label{position:absolute;font-size:10px;font-weight:700;letter-spacing:1px;opacity:.25;pointer-events:none;z-index:0;text-transform:uppercase}
.ql-dev{top:12px;right:24px;color:#3b82f6}
.ql-plan{top:12px;left:24px;color:#8b5cf6}
.ql-market{bottom:12px;left:24px;color:#22c55e}
.ql-design{bottom:12px;right:24px;color:#ec4899}

/* Block detail popup */
.block-popup{position:fixed;z-index:200;background:#111827;border:1px solid var(--border);border-radius:12px;
  padding:16px;width:320px;max-height:400px;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.6);
  animation:bubbleIn .2s ease}
.block-popup h4{font-size:13px;color:#f1f5f9;margin-bottom:8px}
.block-popup .bp-close{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.block-popup .bp-agent{font-size:10px;color:#a5b4fc;margin-bottom:6px}
.block-popup .bp-content{font-size:11px;color:var(--text);line-height:1.6;white-space:pre-wrap}
.block-popup .bp-status{display:inline-block;padding:2px 8px;border-radius:8px;font-size:9px;font-weight:600;margin-bottom:8px}

/* Tooltip on hover */
.map-block .block-tooltip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 10px;font-size:9px;
  color:var(--text);white-space:nowrap;z-index:100;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.map-block:not(.fog):hover .block-tooltip{display:block}

/* Command Bar */
.cmd-bar{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:6px 16px;display:none;gap:8px;align-items:center}
.cmd-bar.show{display:flex}
.cmd-chips{display:flex;gap:3px;flex-shrink:0;overflow-x:auto}
.cmd-chip{background:var(--card);border:1px solid #374151;border-radius:12px;padding:3px 8px;font-size:10px;cursor:pointer;white-space:nowrap;color:var(--dim)}
.cmd-chip:hover{border-color:var(--accent);color:var(--text)}
.cmd-input{flex:1;background:var(--card);border:1px solid #374151;border-radius:10px;padding:8px 14px;color:var(--text);font-size:13px;outline:none}
.cmd-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(59,130,246,.2)}
.cmd-input::placeholder{color:#475569}
.cmd-send{background:var(--accent);color:white;border:none;border-radius:10px;padding:8px 18px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.cmd-send:active{transform:scale(.95)}
.cmd-sent{display:none;align-items:center;gap:8px;font-size:11px;overflow:hidden}
.cmd-bar.show .cmd-sent.visible{display:flex}
.cmd-sent-msg{color:#a5b4fc;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;animation:sentSlideIn .3s ease}
.cmd-sent-status{color:var(--dim);font-size:10px;display:flex;align-items:center;gap:4px}
.cmd-sent-status .dot-pulse{width:6px;height:6px;border-radius:50%;background:var(--yellow);animation:dotPulse 1s ease-in-out infinite}
@keyframes sentSlideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes dotPulse{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Side drawer */
.drawer-toggle{position:fixed;right:0;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:2px}
.drawer-toggle button{background:var(--panel);border:1px solid var(--border);border-right:none;border-radius:6px 0 0 6px;padding:8px 4px;cursor:pointer;font-size:12px;color:var(--dim);width:28px;transition:all .15s}
.drawer-toggle button:hover{color:var(--text);background:#1e293b}
.drawer-toggle button.active{color:white;background:var(--accent);border-color:var(--accent)}
.drawer-toggle .badge{position:absolute;top:-2px;right:2px;background:var(--red);color:white;font-size:7px;border-radius:50%;width:12px;height:12px;display:flex;align-items:center;justify-content:center}
.drawer{position:fixed;right:0;top:0;bottom:0;width:360px;background:var(--panel);border-left:1px solid var(--border);z-index:40;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.drawer-head h3{font-size:12px;flex:1}
.drawer-head button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
.drawer-body{flex:1;overflow-y:auto;padding:8px}

/* Plan Tree */
.plan-tree{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:11px;line-height:1.5}
.plan-node{position:relative;padding-left:20px}
.plan-node::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:#1e3a5f}
.plan-node:last-child::before{height:12px}
.plan-node::after{content:'';position:absolute;left:7px;top:12px;width:10px;height:1px;background:#1e3a5f}
.plan-root>.plan-node::before,.plan-root>.plan-node::after{display:none}
.plan-root>.plan-node{padding-left:0}
.plan-row{display:flex;align-items:center;gap:6px;padding:2px 4px;border-radius:4px;cursor:pointer;transition:background .1s}
.plan-row:hover{background:rgba(59,130,246,.08)}
.plan-chk{width:16px;height:16px;border:2px solid #334155;border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;font-size:10px}
.plan-chk.done{background:#064e3b;border-color:#22c55e;color:#4ade80}
.plan-chk.progress{background:#1c1917;border-color:#fbbf24;color:#fbbf24}
.plan-chk:hover{border-color:var(--accent);transform:scale(1.1)}
.plan-label{flex:1;color:#e2e8f0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-label.done{color:#64748b;text-decoration:line-through}
.plan-label.progress{color:#fbbf24}
.plan-agent{font-size:9px;color:#475569;background:#0f172a;padding:1px 5px;border-radius:3px;flex-shrink:0}
.plan-acts{display:none;gap:2px;flex-shrink:0}
.plan-row:hover .plan-acts{display:flex}
.plan-acts button{background:none;border:none;color:#475569;cursor:pointer;font-size:10px;padding:1px 3px;border-radius:2px}
.plan-acts button:hover{color:var(--text);background:#1e293b}
.plan-pbar{height:3px;background:#0f172a;border-radius:2px;margin:2px 0 4px 22px;overflow:hidden}
.plan-pfill{height:100%;background:linear-gradient(90deg,#3b82f6,#22c55e);border-radius:2px;transition:width .4s}
.plan-add-inline{display:flex;gap:5px;align-items:center;padding:2px 4px;margin:2px 0 2px 22px}
.plan-add-inline input{flex:1;background:#0f172a;border:1px solid #1e3a5f;border-radius:4px;padding:3px 8px;color:var(--text);font-size:11px;outline:none;font-family:inherit}

/* Task/Approval items */
.task-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;margin-bottom:3px;font-size:10px;background:var(--card);border-left:3px solid var(--dim)}
.task-item.done{border-left-color:var(--green);opacity:.6}
.task-item.progress{border-left-color:var(--yellow)}
.appr-card{background:var(--card);border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid var(--yellow)}
.appr-card button{border:none;border-radius:4px;padding:4px 12px;font-size:10px;cursor:pointer;font-weight:600}
.file-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-bottom:1px solid #1e293b;font-size:10px;cursor:pointer}
.file-item:hover{background:#1a2332}

/* Empty state */
.empty{display:none;text-align:center;padding:80px 20px;color:var(--dim);flex:1}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:20px;width:90%;max-width:400px}
.modal h2{font-size:16px;margin-bottom:12px}
.modal label{display:block;font-size:11px;color:var(--dim);margin:8px 0 4px}
.modal input,.modal select{width:100%;background:var(--card);border:1px solid #374151;border-radius:8px;padding:8px;color:var(--text);font-size:12px;outline:none;box-sizing:border-box}
.modal-acts{display:flex;gap:8px;margin-top:12px;justify-content:flex-end}
.preset{background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 8px;font-size:10px;color:var(--dim);cursor:pointer}
.preset:hover{border-color:var(--accent);color:var(--text)}

/* Lang overlay */
.lang-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:999;align-items:center;justify-content:center}
/* Toast */
.toasts{position:fixed;bottom:60px;right:20px;z-index:500;display:flex;flex-direction:column;gap:6px}
.toast{background:#1e293b;color:var(--text);padding:8px 16px;border-radius:8px;font-size:11px;border-left:3px solid var(--accent);animation:bubbleIn .3s}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes bubbleIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
</style>
</head>
<body>

<!-- Language Setup -->
<div class="lang-overlay" id="lang-overlay">
  <div style="background:linear-gradient(145deg,#0f172a,#1e293b);border:1px solid #334155;border-radius:16px;padding:32px;max-width:400px;width:90%;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">🌍</div>
    <div style="font-size:18px;font-weight:700;color:#f1f5f9;margin-bottom:4px">Welcome to AI Company Hub</div>
    <div style="font-size:12px;color:#94a3b8;margin-bottom:20px">Type your language to set up the interface</div>
    <input id="lang-input" placeholder="e.g. Korean, English, 日本語..." style="width:100%;background:#0f172a;border:2px solid #334155;border-radius:10px;padding:12px;color:#f1f5f9;font-size:14px;text-align:center;outline:none;box-sizing:border-box" onkeydown="if(event.key==='Enter')genLang()">
    <div id="lang-status" style="font-size:11px;color:var(--dim);margin-top:10px;min-height:20px"></div>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:center">
      <button onclick="genLang()" id="lang-btn" class="btn-primary" style="padding:10px 24px;font-size:13px">🚀 Set Up</button>

<script>
// ─── Utils ───
function $(id){return document.getElementById(id)}
function _e(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ─── i18n ───
const UI={ko:{},en:{}};
let lang=localStorage.getItem('hub-lang')||'ko';
async function checkLang(){
  const o=$('lang-overlay');
  if(!localStorage.getItem('hub-lang')){o.style.display='flex';return}
  o.style.display='none';
  try{const r=await fetch(`/api/i18n/${lang}`);if(r.ok){UI[lang]=await r.json()}}catch(e){}
}
async function genLang(){
  const v=$('lang-input').value.trim();if(!v)return;
  const b=$('lang-btn'),s=$('lang-status');
  b.disabled=true;b.textContent='⏳...';s.textContent='Translating...';s.style.color='#60a5fa';
  try{const r=await fetch('/api/i18n/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({language:v})});const d=await r.json();
    if(d.ok){s.textContent='✅';localStorage.setItem('hub-lang',d.lang_code);lang=d.lang_code;setTimeout(()=>$('lang-overlay').style.display='none',500)}
    else{s.textContent='❌ '+d.error;s.style.color='#ef4444';b.disabled=false;b.textContent='🚀 Retry'}}
  catch(e){s.textContent='❌';b.disabled=false;b.textContent='🚀 Retry'}
}
function skipLang(){localStorage.setItem('hub-lang','en');lang='en';$('lang-overlay').style.display='none'}
function resetLang(){localStorage.removeItem('hub-lang');$('lang-overlay').style.display='flex'}

// ─── Browser Notifications ───
let notifEnabled=localStorage.getItem('hub-notif')!=='off';
function initNotif(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'&&notifEnabled)Notification.requestPermission();
  updateNotifBtn();
}
function toggleNotif(){
  notifEnabled=!notifEnabled;
  localStorage.setItem('hub-notif',notifEnabled?'on':'off');
  if(notifEnabled&&'Notification' in window&&Notification.permission==='default')Notification.requestPermission();
  updateNotifBtn();
}
function updateNotifBtn(){
  const b=$('notif-toggle');if(!b)return;
  b.style.opacity=notifEnabled?'1':'0.4';
  b.title=notifEnabled?'알림 켜짐':'알림 꺼짐';
}
function notify(title,body){
  if(!notifEnabled||!document.hidden)return;
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  try{
    const n=new Notification(title,{body,icon:'🏢'});
    n.onclick=()=>{window.focus();n.close()};
    setTimeout(()=>n.close(),5000);
  }catch(e){}
}

// ─── State ───
let cos=[],cur=null,lastLen=0,approvals=[],tasks=[],costs=null;
const thinking={};
// Per-agent speech log: { agentId: [{type,html,time},...] }
const agentLog={};

// ─── Core ───
async function load(){
  try{cos=(await(await fetch('/api/companies')).json())}catch(e){cos=[]}
  renderTabs();
  if(!cos.length){$('empty').style.display='block';$('fog-map').style.display='none';$('cmd-bar').classList.remove('show');$('drawer-btns').style.display='none'}
  else{$('empty').style.display='none';$('fog-map').style.display='block';$('cmd-bar').classList.add('show');$('drawer-btns').style.display='';if(!cur||!cos.find(c=>c.id===cur))sel(cos[0].id);else refresh()}
}
function renderTabs(){$('tabs').innerHTML=cos.map(c=>`<div class="tab ${c.id===cur?'active':''}" onclick="sel('${c.id}')">${_e(c.name)}<span class="x" onclick="event.stopPropagation();delCo('${c.id}','${_e(c.name)}')">✕</span></div>`).join('')}
async function sel(id){cur=id;lastLen=0;Object.keys(agentLog).forEach(k=>delete agentLog[k]);renderTabs();await refresh()}

async function refresh(){
  if(!cur)return;
  const c=await(await fetch(`/api/company/${cur}`)).json();
  // Build agent chips
  $('cmd-chips').innerHTML=(c.agents||[]).map(a=>`<span class="cmd-chip" onclick="ins('${a.name}')">${a.emoji} @${a.name}</span>`).join('');
  // Populate agent logs from chat history
  (c.chat||[]).forEach(m=>{
    if(m.type==='agent'&&m.from){
      const ag=(c.agents||[]).find(a=>a.name===m.from);
      if(ag)pushSpeech(ag.id,m.text||'',m.from,ag.emoji||'🤖',m.time||'')
    }
  });
  lastLen=(c.chat||[]).length;
  renderFogMap();extras();
}

function pushSpeech(aid,text,name,emoji,time){
  if(!agentLog[aid])agentLog[aid]=[];
  // Dedupe by text prefix
  const last=agentLog[aid][agentLog[aid].length-1];
  if(last&&last.raw===text)return;
  // Parse mentions/delegations
  const mentions=(text.match(/@(\w+)/g)||[]).map(t=>t.slice(1));
  const hasDelegate=mentions.length>0;
  agentLog[aid].push({raw:text,mentions,hasDelegate,time:time||now(),name,emoji});
  if(agentLog[aid].length>8)agentLog[aid].shift();
}
function now(){return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}

async function extras(){
  if(!cur)return;
  try{const[b,c,a,n]=await Promise.all([fetch(`/api/board-tasks/${cur}`),fetch(`/api/costs/${cur}`),fetch(`/api/approvals/${cur}?status=pending`),fetch(`/api/narrative/${cur}`)]);
    tasks=await b.json();costs=await c.json();approvals=await a.json();const nd=await n.json();renderBanner();renderStats();updateAprBadge();renderNarrative(nd.events||[])}catch(e){}
}

// ─── Event Narrative ───
let narrativeOpen=true;
function toggleNarrative(){
  const p=$('narrative-panel');
  if(p)p.classList.toggle('open');
  narrativeOpen=p&&p.classList.contains('open');
}
function renderNarrative(events){
  const panel=$('narrative-panel');
  if(!panel)return;
  if(!cur)return;
  panel.style.display='block';
  if(narrativeOpen)panel.classList.add('open');
  const body=$('narrative-body');
  const cnt=$('narrative-count');
  if(cnt)cnt.textContent=events.length?`(${events.length}건)`:'';
  if(!events.length){
    body.innerHTML='<div class="narrative-empty">아직 사건이 없습니다</div>';
    return;
  }
  body.innerHTML=events.map(ev=>{
    const cls=ev.type||'';
    return`<div class="narrative-event ${cls}"><span class="ne-icon">${ev.icon||'•'}</span><span class="ne-text">${_e(ev.text)}</span><span class="ne-time">${ev.time||''}</span></div>`;
  }).join('');
}

// ─── Map Zoom ───
let _mapScale=1;
function mapZoom(dir){
  if(dir===0)_mapScale=1;
  else _mapScale=Math.max(.4,Math.min(2,_mapScale+dir*.15));
  const grid=$('map-grid');if(grid)grid.style.transform=`scale(${_mapScale})`;
  const lbl=$('zoom-level');if(lbl)lbl.textContent=Math.round(_mapScale*100)+'%';
}
// Ctrl+scroll zoom on the map
document.addEventListener('DOMContentLoaded',()=>{
  const fm=$('fog-map');if(!fm)return;
  fm.addEventListener('wheel',e=>{
    if(!e.ctrlKey)return;
    e.preventDefault();
    mapZoom(e.deltaY<0?1:-1);
  },{passive:false});
});

// ─── Fog of War Map ───
const CAT_KEYWORDS={
  dev:['코딩','개발','API','서버','프론트','백엔드','DB','배포','frontend','backend','deploy','server','database','coding','api'],
  plan:['기획','전략','분석','리서치','조사','계획','planning','strategy','research','analysis'],
  market:['마케팅','홍보','SNS','광고','SEO','콘텐츠','브랜딩','marketing','branding','content','ads','seo'],
  design:['디자인','UI','UX','시안','로고','이미지','스프라이트','design','logo','image','wireframe','mockup']
};
const CAT_META={
  dev:{label:'개발',cls:'q-dev',tint:'rgba(59,130,246,0.1)'},
  plan:{label:'기획',cls:'q-plan',tint:'rgba(139,92,246,0.1)'},
  market:{label:'마케팅',cls:'q-market',tint:'rgba(34,197,94,0.1)'},
  design:{label:'디자인',cls:'q-design',tint:'rgba(236,72,153,0.1)'}
};
function detectCategory(title){
  if(!title)return'plan';
  const t=title.toLowerCase();
  for(const[cat,kws]of Object.entries(CAT_KEYWORDS)){
    if(kws.some(k=>t.includes(k.toLowerCase())))return cat;
  }
  return'plan';
}

// Quadrant placement: each quadrant fills from center outward
// Grid layout: center is HQ, quadrants spiral outward
function buildGridPositions(counts){
  // We'll use a coordinate system where (0,0) is HQ
  // plan=top-left(-x,+y), dev=top-right(+x,+y), market=bottom-left(-x,-y), design=bottom-right(+x,-y)
  const positions={plan:[],dev:[],market:[],design:[]};
  const quadrantOffsets={
    plan:{dx:-1,dy:-1},  // top-left in grid (row<center, col<center)
    dev:{dx:1,dy:-1},    // top-right
    market:{dx:-1,dy:1}, // bottom-left
    design:{dx:1,dy:1}   // bottom-right
  };
  for(const[cat,off]of Object.entries(quadrantOffsets)){
    const need=counts[cat]||0;
    let placed=0;
    // Spiral outward from center in the quadrant direction
    for(let ring=1;ring<=8&&placed<need;ring++){
      for(let i=0;i<ring&&placed<need;i++){
        for(let j=0;j<ring&&placed<need;j++){
          const r=off.dy<0?-ring+j:-1+ring-j;
          const c=off.dx<0?-ring+i:-1+ring-i;
          // Check not already used
          const key=r+','+c;
          const used=Object.values(positions).flat().some(p=>p.r===r&&p.c===c);
          if(!used){positions[cat].push({r,c});placed++}
        }
      }
    }
  }
  return positions;
}

function renderFogMap(){
  const grid=$('map-grid');if(!grid)return;
  const c=cos.find(x=>x.id===cur);
  if(!c){grid.innerHTML='';return}

  // Collect all task-blocks from kanban tasks
  const blockData=[];
  const agentMap={};
  (c.agents||[]).forEach(a=>{agentMap[a.id]=a;agentMap[a.name]=a});

  // Pending approvals set
  const pendingApprovalTasks=new Set();
  (approvals||[]).filter(a=>a.status==='pending').forEach(a=>{
    if(a.task_id)pendingApprovalTasks.add(a.task_id);
    if(a.title)pendingApprovalTasks.add(a.title);
  });

  (tasks||[]).forEach(t=>{
    const cat=detectCategory(t.title);
    let state='hazy';
    if(t.status==='완료')state='done';
    else if(t.status==='진행중'){
      // Check if this agent is actively thinking right now
      state=agent&&thinking[cur+':'+agent.id]?'thinking':'working';
    }
    else state='hazy';
    // Check if blocked by approval
    if(pendingApprovalTasks.has(t.id)||pendingApprovalTasks.has(t.title))state='blocked';
    // Check if agent is thinking
    const agent=agentMap[t.agent_id]||null;
    if(agent&&thinking[cur+':'+agent.id]&&state==='working')state='working';
    blockData.push({id:t.id,title:t.title,cat,state,agent,task:t});
  });

  // Count per category
  const counts={dev:0,plan:0,market:0,design:0};
  blockData.forEach(b=>counts[b.cat]++);

  // Ensure minimum fog blocks per quadrant
  const minPerQuad=3;
  const fogBlocks=[];
  for(const cat of['dev','plan','market','design']){
    const need=Math.max(minPerQuad,counts[cat]+2)-counts[cat];
    for(let i=0;i<need;i++)fogBlocks.push({id:'fog-'+cat+'-'+i,title:'',cat,state:'fog',agent:null,task:null});
    counts[cat]+=need;
  }

  const allBlocks=[...blockData,...fogBlocks];
  const positions=buildGridPositions(counts);

  // Assign positions
  const placed=[];
  const catIndex={dev:0,plan:0,market:0,design:0};
  // Place real blocks first, then fog
  blockData.forEach(b=>{
    const idx=catIndex[b.cat]++;
    const pos=(positions[b.cat]||[])[idx]||{r:0,c:0};
    placed.push({...b,row:pos.r,col:pos.c});
  });
  fogBlocks.forEach(b=>{
    const idx=catIndex[b.cat]++;
    const pos=(positions[b.cat]||[])[idx]||{r:0,c:0};
    placed.push({...b,row:pos.r,col:pos.c});
  });

  // Find grid bounds
  let minR=0,maxR=0,minC=0,maxC=0;
  placed.forEach(b=>{
    if(b.row<minR)minR=b.row;if(b.row>maxR)maxR=b.row;
    if(b.col<minC)minC=b.col;if(b.col>maxC)maxC=b.col;
  });
  // Include center (0,0) for HQ
  if(minR>0)minR=0;if(maxR<0)maxR=0;if(minC>0)minC=0;if(maxC<0)maxC=0;
  // Add padding
  minR--;maxR++;minC--;maxC++;

  const rows=maxR-minR+1;
  const cols=maxC-minC+1;

  grid.style.gridTemplateColumns=`repeat(${cols},120px)`;
  grid.style.gridTemplateRows=`repeat(${rows},90px)`;
  grid.style.width=(cols*126)+'px';

  // Build lookup
  const lookup={};
  placed.forEach(b=>{lookup[b.row+','+b.col]=b});

  let html='';
  for(let r=minR;r<=maxR;r++){
    for(let c=minC;c<=maxC;c++){
      const gridR=r-minR+1;
      const gridC=c-minC+1;
      if(r===0&&c===0){
        // HQ block
        const company=cos.find(x=>x.id===cur);
        html+=`<div class="map-block hq" style="grid-row:${gridR};grid-column:${gridC}">
          <span class="block-icon">🏢</span>
          <span class="block-title">${_e(company?company.name:'AI Company')}</span>
          <span class="block-sub">${(company?.agents||[]).length}명의 에이전트</span>
        </div>`;
        continue;
      }
      const block=lookup[r+','+c];
      if(block){
        html+=renderMapBlock(block,gridR,gridC);
      }else{
        // Empty fog cell
        html+=`<div class="map-block fog" style="grid-row:${gridR};grid-column:${gridC}"></div>`;
      }
    }
  }
  grid.innerHTML=html;
}

function renderMapBlock(b,gridR,gridC){
  const catCls=CAT_META[b.cat]?CAT_META[b.cat].cls:'';
  const stateCls=b.state;
  const agentIcon=b.agent?`<span class="block-agent">${b.agent.emoji||'🤖'}</span>`:'';
  const stateIcon=b.state==='done'?'✨':b.state==='thinking'?'⚡':b.state==='working'?'🔄':b.state==='blocked'?'⚠️':b.state==='hazy'?'◻️':'🌫️';

  let inner='';
  if(b.state==='fog'){
    inner=`<span class="block-icon" style="opacity:.3">🌫️</span>`;
  }else{
    const titleText=_e((b.title||'').substring(0,14));
    inner=`<span class="block-icon">${stateIcon}</span>`;
    inner+=`<span class="block-title">${titleText}</span>`;
    if(b.agent){
      inner+=`<span class="block-sub">${b.agent.emoji||'🤖'} ${_e(b.agent.name||'')}</span>`;
    }
    if(b.state==='done'){
      inner+=`<span class="block-result" onclick="event.stopPropagation();showBlockDetail('${b.id}')">📄 결과보기</span>`;
    }
    if(b.state==='working'||b.state==='thinking'){
      // Show last speech snippet + progress
      const logs=b.agent?agentLog[b.agent.id]:null;
      const lastMsg=logs&&logs.length?logs[logs.length-1].raw:'';
      if(lastMsg){
        const snippet=_e(lastMsg.replace(/^##\s*/gm,'').replace(/\n/g,' ').substring(0,25));
        inner+=`<span class="block-speech">💬 ${snippet}...</span>`;
      }
      if(b.state==='thinking'){
        inner+=`<div class="block-progress"><div class="block-progress-fill" style="width:100%;background:linear-gradient(90deg,#fbbf24,#f59e0b);animation:progressPulse 1s ease-in-out infinite"></div></div>`;
      }else{
        inner+=`<div class="block-progress"><div class="block-progress-fill" style="width:70%;background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div></div>`;
      }
    }
    // Tooltip
    const logs=b.agent?agentLog[b.agent.id]:null;
    const lastSpeech=logs&&logs.length?_e(logs[logs.length-1].raw.substring(0,60)):'';
    const tooltipText=b.agent?`${b.agent.emoji} ${b.agent.name} · ${_e(b.title||'')}${lastSpeech?' · '+lastSpeech:''}`:_e(b.title||'');
    inner+=`<div class="block-tooltip">${tooltipText}</div>`;
  }
  inner+=agentIcon;

  const clickHandler=b.state==='done'?`onclick="showBlockDetail('${b.id}')"`
    :b.state==='working'||b.state==='thinking'?`onclick="showBlockSpeech('${b.agent?b.agent.id:''}')"`
    :b.state==='blocked'?`onclick="showBlockDetail('${b.id}')"`:'';

  return`<div class="map-block ${stateCls} ${catCls}" style="grid-row:${gridR};grid-column:${gridC}" ${clickHandler}>${inner}</div>`;
}

function showBlockDetail(taskId){
  // Close any existing popup
  document.querySelectorAll('.block-popup').forEach(el=>el.remove());
  const t=(tasks||[]).find(x=>x.id===taskId);
  if(!t)return;
  const agent=t.agent_id?((cos.find(x=>x.id===cur)?.agents||[]).find(a=>a.id===t.agent_id)):null;
  const statusColor=t.status==='완료'?'background:#064e3b;color:#6ee7b7':t.status==='진행중'?'background:#1c1917;color:#fbbf24':'background:#1e293b;color:var(--dim)';
  const popup=document.createElement('div');
  popup.className='block-popup';
  popup.innerHTML=`
    <button class="bp-close" onclick="this.parentElement.remove()">✕</button>
    <h4>${t.status==='완료'?'✨':'🔄'} ${_e(t.title)}</h4>
    <span class="bp-status" style="${statusColor}">${_e(t.status||'대기')}</span>
    ${agent?`<div class="bp-agent">${agent.emoji||'🤖'} ${_e(agent.name)} · ${_e(agent.role||'')}</div>`:''}

  popup.style.top='50%';popup.style.left='50%';popup.style.transform='translate(-50%,-50%)';

}

function showBlockSpeech(agentId){

  `;

  const closer=e=>{if(!popup.contains(e.target)){popup.remove();document.removeEventListener('click',closer)}};

function fmtBubble(text){
  let h=_e(text);
  h=h.replace(/^## (.+)$/gm,'<div style="font-size:12px;font-weight:700;color:#f1f5f9;margin:4px 0 2px">$1</div>');
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
  h=h.replace(/@(\w+)/g,'<span class="at">@$1</span>');
  h=h.replace(/^- (.+)$/gm,'<div style="padding-left:8px">• $1</div>');
  h=h.replace(/\n/g,'<br>');
  return h;
}

async function send(){

  i.value='';

  const sentEl=$('cmd-sent'),msgEl=$('cmd-sent-msg'),statusEl=$('cmd-sent-status'),btn=$('cmd-send-btn');
  const target=(t.match(/@(\w+)/)||[])[1]||'';

  // Flash command bar border
  const bar=$('cmd-bar');if(bar){bar.style.borderColor='var(--accent)';setTimeout(()=>bar.style.borderColor='',600)}

  _sentTimeout=setTimeout(()=>{if(sentEl)sentEl.classList.remove('visible')},120000);
}

let _planTasks=[],_planAddPar=null;
async function fetchPlanTasks(){
  if(!cur)return;
  try{const r=await fetch(`/api/plan-tasks/${cur}`);_planTasks=await r.json();renderPlanTree()}catch(e){}
}
function renderPlanTree(){
  const el=$('drawer-body');if(!el||curDrawer!=='plan')return;
  if(!_planTasks.length){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--dim);font-size:10px">📋 에이전트가 작업하면 자동 생성됩니다<br><span style="font-size:9px;cursor:pointer;color:var(--accent)" onclick="planAddStart(null)">＋ 직접 추가</span></div>';return}
  const roots=_planTasks.filter(t=>!t.parent_id);
  const co=cos.find(c=>c.id===cur);
  let h='<div class="plan-tree"><div class="plan-root">';
  h+=_planAddInline(null);
  roots.forEach(t=>{h+=_planNode(t,co)});
  h+='</div></div>';
  el.innerHTML=h;
}
function _planAddInline(pid){
  const k=pid||'root';if(_planAddPar!==k)return'';
  const co=cos.find(c=>c.id===cur);
  const opts=(co?.agents||[]).map(a=>`<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('');
  return`<div class="plan-add-inline"><input id="pai-${k}" placeholder="작업 제목..." onkeydown="if(event.key==='Enter')planAddSubmit('${pid||''}');if(event.key==='Escape')planAddCancel()"><select id="paa-${k}" style="background:#0f172a;border:1px solid #1e3a5f;border-radius:4px;padding:2px 4px;color:var(--text);font-size:10px;max-width:80px"><option value="">담당</option>${opts}</select><button onclick="planAddSubmit('${pid||''}')" style="background:var(--accent);color:white;border:none;border-radius:4px;padding:2px 8px;font-size:10px;cursor:pointer">↵</button><button onclick="planAddCancel()" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:10px">✕</button></div>`;
}
function _planNode(t,co){
  const s=t.status||'todo';
  const chkCls=s==='done'?'done':s==='in-progress'?'progress':'';
  const chkIcon=s==='done'?'✓':s==='in-progress'?'↻':'';
  const lblCls=s==='done'?'done':s==='in-progress'?'progress':'';
  const kids=_planTasks.filter(c=>c.parent_id===t.id);
  const total=kids.length,done=kids.filter(c=>c.status==='done').length;
  const ag=(co?.agents||[]).find(a=>a.id===t.agent_id);
  const agTag=ag?`<span class="plan-agent">${ag.emoji||''} ${ag.name||t.agent_id}</span>`:(t.agent_id?`<span class="plan-agent">${t.agent_id}</span>`:'');
  let h=`<div class="plan-node" id="pn-${t.id}"><div class="plan-row" onclick="planCycle('${t.id}')"><div class="plan-chk ${chkCls}" title="상태 변경">${chkIcon}</div><span class="plan-label ${lblCls}">${_e(t.title)}</span>${agTag}<div class="plan-acts" onclick="event.stopPropagation()"><button onclick="planAddStart('${t.id}')" title="하위 추가">＋</button><button onclick="planDel('${t.id}')" title="삭제">✕</button></div></div>`;
  if(total>0)h+=`<div class="plan-pbar"><div class="plan-pfill" style="width:${Math.round(done/total*100)}%"></div></div>`;
  h+=_planAddInline(t.id);
  kids.forEach(c=>{h+=_planNode(c,co)});
  h+='</div>';return h;
}
function planAddStart(pid){_planAddPar=pid||'root';renderPlanTree();setTimeout(()=>{const el=document.getElementById('pai-'+(pid||'root'));if(el)el.focus()},50)}
function planAddCancel(){_planAddPar=null;renderPlanTree()}
async function planAddSubmit(pid){
  const k=pid||'root',inp=document.getElementById('pai-'+k),sel=document.getElementById('paa-'+k);
  const title=(inp?.value||'').trim();if(!title){planAddCancel();return}
  _planAddPar=null;
  try{const r=await fetch(`/api/plan-task-add/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,parent_id:pid||null,agent_id:sel?.value||'',status:'todo'})});
    const d=await r.json();if(d.ok){_planTasks.push(d.task);renderPlanTree()}else toast('추가 실패')}catch(e){toast('오류')}
}
async function planCycle(id){
  const t=_planTasks.find(x=>x.id===id);if(!t)return;
  const nxt={todo:'in-progress','in-progress':'done',done:'todo',blocked:'todo'};
  t.status=nxt[t.status]||'todo';renderPlanTree();
  try{await fetch(`/api/plan-task-update/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status:t.status})})}catch(e){}
}
async function planDel(id){
  const t=_planTasks.find(x=>x.id===id);if(!t||!confirm(`"${t.title}" 삭제?`))return;
  try{const r=await fetch(`/api/plan-task-delete/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
    const d=await r.json();if(d.ok){const rm=new Set();const col=i=>{rm.add(i);_planTasks.filter(x=>x.parent_id===i).forEach(x=>col(x.id))};col(id);_planTasks=_planTasks.filter(x=>!rm.has(x.id));renderPlanTree()}else toast('삭제 실패')}catch(e){toast('오류')}
}

      _setCmdBarLock(true,`⏳ ${agentCount}개 에이전트 등록 중... 잠시 기다려주세요`);
      toast(`🏢 ${n} 생성됨 — ${agentCount}개 에이전트 등록 중...`);
      _watchAgentReady(r.company.id,agentCount);
    }else toast('❌ 생성 실패: '+(r.error||''));
  }catch(e){toast('❌ 생성 오류')}
  if(btn){btn.disabled=false;btn.textContent='생성'}
}
function _watchAgentReady(cid,total){
  let _interval=setInterval(async()=>{
    try{
      const c=await(await fetch(`/api/company/${cid}`)).json();
      if(!c||!c.agents){clearInterval(_interval);return}
      const ready=c.agents.filter(a=>a.status==='active').length;
      const registering=c.agents.filter(a=>a.status==='registering');
      if(ready>=total){
        clearInterval(_interval);
        toast(`✅ 모든 에이전트 준비 완료! 지시를 내리세요.`);
        _setCmdBarLock(false);
        renderFogMap();
      }else{
        const names=registering.map(a=>a.emoji+' '+a.name).join(', ');
        toast(`⏳ ${ready}/${total} 준비 완료 — 등록 중: ${names}`);
      }
    }catch(e){clearInterval(_interval)}
  },5000);
  // Safety: stop after 3 minutes
  setTimeout(()=>{clearInterval(_interval);_setCmdBarLock(false)},180000);
}
async function delCo(id,name){
  if(!confirm(`"${name}" 삭제?`))return;
  toast('🗑️ 삭제 중...');
  try{
    const r=await fetch('/api/company/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
    const d=await r.json();
    if(d.ok){toast('✅ 삭제 완료');cur=null;load()}
    else toast('❌ 삭제 실패');
  }catch(e){toast('❌ 삭제 오류')}
}
function fp(n,r,e){$('a-name').value=n;$('a-role').value=r;$('a-emoji').value=e}
async function openAgent(){
  const s=$('a-parent'),c=cos.find(x=>x.id===cur);s.innerHTML='<option value="">리더 직속</option>';
  if(c)(c.agents||[]).forEach(a=>s.innerHTML+=`<option value="${a.id}">${a.emoji} ${a.name}</option>`);
  const m=$('a-model');m.innerHTML='<option value="">기본</option>';
  try{const r=await(await fetch('/api/models')).json();(r.models||[]).forEach(x=>m.innerHTML+=`<option value="${x.id}">${x.name}</option>`)}catch(e){}
  $('agent-modal').classList.add('show');
}
async function addAgent(){
  const n=$('a-name').value.trim(),r=$('a-role').value.trim();if(!n||!r)return alert('이름과 역할 입력');
  toast(n+' 생성 중...');
  try{const res=await(await fetch(`/api/agent-add/${cur}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,role:r,emoji:$('a-emoji').value,parent_agent:$('a-parent').value,model:$('a-model').value})})).json();
    if(res.ok){toast(n+' 추가됨');$('agent-modal').classList.remove('show');refresh()}}catch(e){toast('오류')}
}
function dl(){if(cur)window.open('/api/download/'+cur)}

// ─── Outsourcing ───
function openOutsource(){
  if(!cur){toast('회사를 먼저 선택하세요');return}
  if(cos.length<2){toast('아웃소싱할 다른 회사가 필요합니다. 회사를 추가하세요.');return}
  const sel=$('os-company');
  sel.innerHTML=cos.filter(c=>c.id!==cur).map(c=>`<option value="${c.id}">${_e(c.name)}</option>`).join('');
  sel.onchange=()=>{
    const tid=sel.value;const tc=cos.find(c=>c.id===tid);
    const as=$('os-agent');as.innerHTML='<option value="">리더 자동선택</option>';
    if(tc)(tc.agents||[]).forEach(a=>as.innerHTML+=`<option value="${a.id}">${a.emoji} ${a.name} (${a.role||''})</option>`);
  };
  sel.onchange();
  $('os-text').value='';
  $('outsource-modal').classList.add('show');
}
async function sendOutsource(){
  const to_cid=$('os-company').value;
  const to_agent=$('os-agent').value;
  const text=$('os-text').value.trim();
  if(!text){toast('의뢰 내용을 입력하세요');return}
  try{
    const r=await(await fetch('/api/cross-nudge',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from_cid:cur,to_cid,from_agent:'',to_agent,text})})).json();
    if(r.ok){toast(`🔗 ${r.to}에 의뢰 전송 완료`);$('outsource-modal').classList.remove('show')}
    else toast('실패: '+(r.error||''))
  }catch(e){toast('오류: '+e.message)}
}

// ─── Toast ───
function toast(m){const el=document.createElement('div');el.className='toast';el.textContent=m;let s=$('toasts');if(!s){s=document.createElement('div');s.id='toasts';s.className='toasts';document.body.appendChild(s)}s.appendChild(el);setTimeout(()=>el.remove(),3000)}

// ─── Search ───
let _st=null;
function debounceSearch(q){clearTimeout(_st);if(!q||q.length<2){$('search-results').style.display='none';return}_st=setTimeout(()=>doSearch(q),350)}
async function doSearch(q){
  const el=$('search-results');el.style.display='block';el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">검색 중...</div>';
  try{const r=await(await fetch(`/api/search?q=${encodeURIComponent(q)}`)).json();
    if(!r.length){el.innerHTML='<div style="padding:8px;font-size:10px;color:var(--dim)">결과 없음</div>';return}
    el.innerHTML=r.slice(0,8).map(x=>`<div style="padding:6px 10px;border-bottom:1px solid #1e293b;cursor:pointer;font-size:10px" onclick="sel('${x.company_id}');$('search-results').style.display='none'"><span style="color:#60a5fa">${_e(x.from||'')}</span> ${_e((x.text||'').substring(0,60))}</div>`).join('')}
  catch(e){el.innerHTML='<div style="padding:8px;color:var(--red);font-size:10px">오류</div>'}
}
document.addEventListener('click',e=>{if(!e.target.closest('#search')&&!e.target.closest('#search-results'))$('search-results').style.display='none'});

// ─── SSE ───
let sseTimer=null;
function connectSSE(){
  if(sseTimer)clearTimeout(sseTimer);
  const es=new EventSource('/api/sse');
  es.addEventListener('init',e=>{try{cos=JSON.parse(e.data);renderTabs()}catch(e){}});
  es.addEventListener('agent_thinking',e=>{try{const d=JSON.parse(e.data);
    thinking[d.cid+':'+d.agent_id]={};
    if(d.cid===cur)renderFogMap();
  }catch(e){}});
  es.addEventListener('agent_done',e=>{try{const d=JSON.parse(e.data);
    notify('✅ 작업 완료',(d.agent_name||d.agent_id)+' 작업 완료');
    delete thinking[d.cid+':'+d.agent_id];
    if(d.cid===cur){
      // Update sent status to show completion
      const statusEl=$('cmd-sent-status');
      if(statusEl&&$('cmd-sent')?.classList.contains('visible')){
        statusEl.innerHTML='<span style="color:var(--green)">✅ '+(d.agent_name||d.agent_id).toUpperCase()+' 완료</span>';
        setTimeout(clearSentStatus,3000);
      }
      renderFogMap();
      extras();
      if(curDrawer==='tasks')renderDrawerTasks($('drawer-body'));
      if(curDrawer==='plan')fetchPlanTasks();
    }
  }catch(e){}});
  es.addEventListener('approval',e=>{try{notify('🔔 결재 요청','새로운 승인 요청이 도착했습니다');if(cur)fetch(`/api/approvals/${cur}?status=pending`).then(r=>r.json()).then(d=>{approvals=d;renderBanner();updateAprBadge()}).catch(()=>{})}catch(e){}});
  es.addEventListener('company_update',e=>{try{const d=JSON.parse(e.data);
    if(d.deleted){cos=cos.filter(c=>c.id!==d.id);renderTabs();if(cur===d.id){cur=cos.length?cos[0].id:null;cur?refresh():load()}return}
    if(!d.company||!d.id)return;const i=cos.findIndex(c=>c.id===d.id);if(i>=0)cos[i]=d.company;else cos.push(d.company);renderTabs();
    if(d.id!==cur)return;
    const c=d.company,chat=c.chat||[];
    // Process new messages
    chat.slice(lastLen).forEach(m=>{
      if(m.type==='agent'&&m.from){
        const ag=(c.agents||[]).find(a=>a.name===m.from);
        if(ag)pushSpeech(ag.id,m.text||'',m.from,ag.emoji||'🤖',m.time||'');
        if((m.text||'').includes('외주')||(m.text||'').includes('outsourc'))notify('🔗 외주 결과',m.from+': '+(m.text||'').substring(0,60));
      }
    });
    lastLen=chat.length;
    renderFogMap();
    // Refresh narrative on new messages
    fetch(`/api/narrative/${cur}`).then(r=>r.json()).then(nd=>renderNarrative(nd.events||[])).catch(()=>{});
  }catch(e){}});
  es.onerror=()=>{es.close();sseTimer=setTimeout(connectSSE,3000)};
}

// ─── Init ───
document.addEventListener('DOMContentLoaded',()=>{checkLang();initNotif()});
load();connectSSE();
