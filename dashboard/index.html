<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Company Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--panel:#111827;--card:#1e293b;--border:#1e3a5f;--text:#e0e0e0;--dim:#64748b;--accent:#3b82f6;--accent2:#8b5cf6;--green:#00ff88;--yellow:#fbbf24;--red:#ef4444}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:14px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px}.header h1 span{color:#7b68ee}
.header .sub{font-size:11px;color:var(--dim);margin-top:1px}
.hdr-right{display:flex;gap:10px;align-items:center}
.lang-switch{display:flex;gap:2px;background:var(--card);border-radius:8px;padding:2px}
.lang-btn{background:transparent;border:none;padding:4px 8px;border-radius:6px;cursor:pointer;font-size:14px;transition:all .15s}
.lang-btn:hover{background:#253047}
.lang-btn.active{background:var(--accent)}
.toolbar{background:#0d1117;padding:10px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.company-tabs{display:flex;gap:6px;flex:1;overflow-x:auto}
.company-tab{background:var(--card);border:1px solid transparent;border-radius:8px;padding:6px 14px;font-size:12px;color:var(--dim);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.company-tab:hover{border-color:var(--accent);color:var(--text)}
.company-tab.active{background:#1e3a5f;border-color:var(--accent);color:white}
.company-tab .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.create-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}

/* Approval Banner */
.approval-banner{background:linear-gradient(90deg,#78350f,#92400e);border-bottom:1px solid #b45309;padding:10px 24px;display:flex;align-items:center;gap:12px;animation:fadeIn .3s}
.approval-banner .ab-icon{font-size:18px}
.approval-banner .ab-text{flex:1;font-size:12px;color:#fcd34d;line-height:1.4}
.approval-banner .ab-actions{display:flex;gap:6px;flex-shrink:0}
.ab-btn{border:none;padding:5px 14px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.ab-btn.approve{background:#064e3b;color:#6ee7b7}.ab-btn.approve:hover{background:#065f46}
.ab-btn.reject{background:#7f1d1d;color:#fca5a5}.ab-btn.reject:hover{background:#991b1b}

/* Goals Section */
.goals-bar{background:#0d1117;border-bottom:1px solid var(--border);padding:10px 24px;display:none}
.goals-bar.show{display:block}
.goals-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.goals-header .panel-title{margin:0}
.goals-list{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.goal-card{background:var(--card);border-radius:8px;padding:8px 12px;min-width:200px;max-width:280px;flex-shrink:0;border-left:3px solid var(--accent2);position:relative}
.goal-title{font-size:11px;font-weight:600;color:#e2e8f0;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px}
.goal-progress{height:4px;background:#374151;border-radius:3px;overflow:hidden}
.goal-pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .5s}
.goal-meta{display:flex;justify-content:space-between;align-items:center;margin-top:4px;font-size:9px;color:var(--dim)}
.goal-del{background:none;border:none;color:#64748b;cursor:pointer;font-size:12px;padding:0 2px;position:absolute;top:6px;right:6px;transition:color .15s}
.goal-del:hover{color:var(--red)}
.goal-inline-form{background:var(--card);border-radius:8px;padding:8px 12px;min-width:220px;display:flex;gap:6px;align-items:center;flex-shrink:0}
.goal-inline-form input{flex:1;background:var(--bg);border:1px solid #374151;border-radius:6px;padding:5px 8px;color:var(--text);font-size:11px;outline:none}
.goal-inline-form input:focus{border-color:var(--accent)}
.goal-inline-form button{background:var(--accent);color:white;border:none;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap}
.goal-inline-form .cancel-btn{background:transparent;color:var(--dim);border:1px solid #374151}

.main{display:grid;grid-template-columns:220px 1fr 340px;gap:14px;padding:14px 24px;height:calc(100vh - 105px);overflow:hidden}
.main.with-goals{height:calc(100vh - 105px - 70px)}
.main.with-approvals{height:calc(100vh - 105px - 44px)}
.main.with-goals.with-approvals{height:calc(100vh - 105px - 70px - 44px)}
.panel{background:var(--panel);border-radius:12px;padding:14px;border:1px solid #1e293b;display:flex;flex-direction:column;overflow:hidden}
.panel-title{font-size:12px;font-weight:600;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.agent-card{background:var(--card);border-radius:8px;padding:9px;margin-bottom:5px;transition:all .15s;border-left:3px solid #4b5563;cursor:pointer}
.agent-card:hover{background:#253047;transform:translateX(2px)}
.agent-card.active{border-left-color:var(--green)}.agent-card.working{border-left-color:var(--yellow)}.agent-card.idle{opacity:.5}.agent-card.registering{border-left-color:var(--accent);opacity:.6;animation:pulse-border 1.5s infinite}
.agent-top{display:flex;align-items:center;gap:6px}
.agent-emoji{font-size:16px}.agent-name{font-size:12px;font-weight:600;color:#f1f5f9}
.agent-role{font-size:9px;color:var(--dim);margin-top:1px}
.agent-meta{display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--dim)}
.agent-tag{font-size:9px;padding:2px 8px;border-radius:6px;font-weight:600}
.agent-tag.active{background:#064e3b;color:#6ee7b7}
.agent-tag.working{background:#78350f;color:#fcd34d}
.agent-tag.idle{background:#1e293b;color:#64748b;border:1px solid #334155}
.agent-tag.registering{background:#1e3a5f;color:#93c5fd;border:1px solid var(--accent)}
.agent-cost{font-size:9px;color:var(--dim);margin-top:2px;display:flex;align-items:center;gap:3px}
.agent-cost .cost-val{color:#94a3b8;font-weight:600}
.pbar{height:2px;background:#374151;border-radius:2px;margin-top:4px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s}

/* Cost footer in sidebar */
.cost-footer{margin-top:auto;padding-top:10px;border-top:1px solid #1e293b;font-size:10px;color:var(--dim);display:flex;justify-content:space-between;align-items:center}
.cost-footer .cost-total{font-size:13px;font-weight:700;color:var(--yellow)}

.chat-panel{display:flex;flex-direction:column}
.mentions{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
.mention-btn{background:var(--card);border:1px solid #374151;border-radius:6px;padding:3px 8px;font-size:10px;color:var(--dim);cursor:pointer;display:flex;align-items:center;gap:3px;transition:all .1s}
.mention-btn:hover{border-color:var(--accent);color:var(--text)}
.chat-messages{flex:1;overflow-y:auto;padding:6px 0;display:flex;flex-direction:column}
.chat-msg{display:flex;gap:7px;margin-bottom:7px;animation:fadeIn .2s;max-width:80%}
.chat-msg.user{align-self:flex-end;flex-direction:row-reverse}
.chat-msg .avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.chat-msg.agent .avatar{background:var(--card)}.chat-msg.user .avatar{background:#1e3a5f}
.chat-body{display:flex;flex-direction:column}.chat-msg.user .chat-body{align-items:flex-end}
.chat-sender{font-size:12px;color:var(--dim);font-weight:700}
.chat-bubble{padding:7px 11px;border-radius:10px;font-size:12px;color:#e2e8f0;line-height:1.5;white-space:pre-wrap}
.chat-bubble table{border-collapse:collapse;margin:6px 0;font-size:11px;width:100%}
.chat-bubble th,.chat-bubble td{border:1px solid #4a5568;padding:4px 8px;text-align:left}
.chat-bubble th{background:#2d3748;font-weight:600}
.chat-bubble code{background:#1a202c;padding:1px 4px;border-radius:3px;font-size:11px}
.chat-msg.agent .chat-bubble{background:var(--card);border:1px solid #2d3748;border-radius:3px 10px 10px 10px}
.chat-msg.user .chat-bubble{background:#1e3a5f;border-radius:10px 3px 10px 10px}
.chat-bubble .mention{color:#60a5fa;font-weight:600}
.chat-input-area{display:flex;gap:7px;margin-top:8px;flex-shrink:0}
.chat-input{flex:1;background:var(--card);border:1px solid #374151;border-radius:8px;padding:9px 12px;color:var(--text);font-size:12px;outline:none}
.chat-input:focus{border-color:var(--accent)}.chat-input::placeholder{color:#4b5563}
.chat-send{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;flex-shrink:0}
.chat-send:hover{opacity:.85}.chat-send:disabled{opacity:.4;cursor:not-allowed}
.typing{display:none;padding:3px 0;font-size:10px;color:var(--dim);flex-shrink:0}
.typing.show{display:flex;align-items:center;gap:4px}
.td span{width:3px;height:3px;background:var(--dim);border-radius:50%;display:inline-block;animation:blink 1.4s infinite}
.td span:nth-child(2){animation-delay:.2s}.td span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.3}50%{opacity:1}}

/* Kanban Board */
.task-table{width:100%;border-collapse:collapse;font-size:11px}
.task-table th{text-align:left;padding:6px 10px;font-size:9px;color:var(--dim);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;font-weight:600;position:sticky;top:0;background:var(--card)}
.task-table td{padding:7px 10px;border-bottom:1px solid #1e293b;vertical-align:middle}
.task-table tr:hover{background:#1a2332}
.task-table .task-title{color:#e2e8f0;font-weight:500;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-table .task-title.done-title{color:#6ee7b7;text-decoration:line-through;opacity:.7}
.task-table .task-agent{font-size:10px;white-space:nowrap}
.task-table .task-status{font-size:10px;font-weight:600;white-space:nowrap}
.task-table .status-wait{color:#94a3b8}
.task-table .status-doing{color:#fcd34d}
.task-table .status-done{color:#6ee7b7}
.task-table .task-del{cursor:pointer;opacity:.4;font-size:10px}
.task-table .task-del:hover{opacity:1;color:#ef4444}
.task-add-row{display:flex;gap:6px;padding:8px 0;align-items:center}
.task-add-row input,.task-add-row select{background:var(--bg);border:1px solid #374151;border-radius:5px;padding:5px 8px;color:var(--text);font-size:11px;outline:none}
.task-add-row input{flex:1}
.task-add-row select{width:100px}
.task-add-row button{border:none;padding:5px 10px;border-radius:5px;font-size:11px;cursor:pointer;background:var(--accent);color:white}.kanban-inline-form .kf-cancel{background:transparent;color:var(--dim);border:1px solid #374151}

/* Recurring Tasks */
.rtask-card{background:var(--card);border-radius:8px;padding:9px;margin-bottom:5px;border-left:3px solid #4b5563;transition:all .15s}
.rtask-card.running{border-left-color:var(--green)}.rtask-card.paused{border-left-color:var(--yellow)}.rtask-card.stopped{border-left-color:#ef4444;opacity:.6}
.rtask-top{display:flex;align-items:center;gap:5px}
.rtask-title{font-size:11px;font-weight:600;color:#f1f5f9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtask-status{font-size:10px;white-space:nowrap}
.rtask-meta{font-size:9px;color:var(--dim);margin-top:3px}
.rtask-result{font-size:9px;color:#94a3b8;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rtask-actions{display:flex;gap:4px;margin-top:5px}
.rtask-btn{background:#1e293b;border:1px solid #374151;border-radius:5px;padding:2px 8px;font-size:9px;color:var(--dim);cursor:pointer;transition:all .1s}
.rtask-btn:hover{border-color:var(--accent);color:var(--text)}

/* Right panel tabs */
.right-tabs{display:flex;gap:2px;margin-bottom:8px}
.right-tab{background:var(--card);border:none;padding:5px 10px;border-radius:6px;font-size:10px;color:var(--dim);cursor:pointer;transition:all .15s;flex:1;text-align:center}
.right-tab:hover{color:var(--text)}
.right-tab.active{background:var(--accent);color:white}
.right-panel-content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.right-panel-content .tab-pane{display:none;flex:1;overflow-y:auto;overflow-x:hidden;flex-direction:column}
.right-panel-content .tab-pane.active{display:flex}

.log-item{display:flex;gap:6px;padding:5px 0;border-bottom:1px solid #1a1a2e;font-size:10px;animation:fadeIn .2s}
.log-avatar{width:22px;height:22px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.log-agent{font-size:10px;font-weight:600;color:#60a5fa}
.log-text{font-size:10px;color:#cbd5e1;line-height:1.3}
.log-time{font-size:8px;color:#4b5563}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;width:420px;max-width:90vw}
.modal h2{font-size:18px;margin-bottom:16px;color:#00d4ff}
.modal label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px;margin-top:12px}
.modal input,.modal select{width:100%;background:var(--card);border:1px solid #374151;border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;outline:none}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end}
.modal-cancel{background:var(--card);border:1px solid #374151;color:var(--dim);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.modal-submit{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-weight:600;font-size:13px;position:relative;transition:opacity .2s}
.modal-submit.loading{pointer-events:none;opacity:.7}
.modal-submit.loading::after{content:'';position:absolute;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:btn-spin .6s linear infinite;top:50%;left:50%;margin:-7px 0 0 -7px}
.modal-submit.loading span{opacity:0}
@keyframes btn-spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#e2e8f0;padding:12px 20px;border-radius:10px;font-size:13px;z-index:200;animation:toast-in .3s ease;box-shadow:0 4px 20px rgba(0,0,0,.4);border:1px solid #334155;max-width:320px}
.toast.fade-out{animation:toast-out .3s ease forwards}
@keyframes toast-in{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toast-out{to{opacity:0;transform:translateY(20px)}}
.loading-toast::before{content:'';display:inline-block;width:12px;height:12px;border:2px solid #475569;border-top-color:#00d4ff;border-radius:50%;animation:btn-spin .6s linear infinite;margin-right:8px;vertical-align:middle}
.topic-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.topic-chip{background:var(--card);border:1px solid #374151;border-radius:6px;padding:4px 10px;font-size:11px;color:var(--dim);cursor:pointer}
.topic-chip:hover,.topic-chip.selected{border-color:var(--accent);color:var(--text)}
.add-agent-btn{background:var(--card);border:1px solid #374151;color:var(--accent);width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.add-agent-btn:hover{background:var(--accent);color:white}
.tab-close{margin-left:6px;font-size:10px;color:#ef4444;cursor:pointer;opacity:0.5;transition:opacity .15s}
.company-tab:hover .tab-close{opacity:1}
.tab-close:hover{color:#ff0000}
.emoji-opt{font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:all .1s}
.emoji-opt:hover,.emoji-opt.selected{background:#253047;transform:scale(1.2)}
.empty-state{text-align:center;padding:40px;color:var(--dim)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px;margin-bottom:4px}
.empty-state .hint{font-size:12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-border{0%,100%{border-left-color:var(--accent)}50%{border-left-color:var(--accent2)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
.chat-msg.mention-msg{margin:2px 12px;padding:4px 8px;background:var(--accent-bg,rgba(99,102,241,0.06));border-left:2px solid var(--accent);border-radius:0 6px 6px 0;display:flex;align-items:center;gap:6px;font-size:11px;flex-wrap:wrap}
.mention-from{font-size:10px;font-weight:700;color:#a78bfa;white-space:nowrap}
.mention-arrow{font-size:11px;color:var(--accent);font-weight:700}
.mention-target{font-size:10px;font-weight:700;color:#60a5fa;white-space:nowrap}
.mention-sep{color:var(--dim);margin:0 2px}
.mention-body{flex:1;line-height:1.3;font-size:11px;min-width:0}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🏢 <span>AI Company Hub</span></h1>
    <div class="sub">Multi-company AI Agent Management Platform</div>
  </div>
  <div class="hdr-right">
    <div class="lang-switch" id="lang-switch"></div>
    <div style="display:flex;align-items:center;gap:5px;background:#0f3460;padding:5px 12px;border-radius:16px;font-size:11px">
      <span style="width:6px;height:6px;border-radius:50%;background:var(--green)"></span> <span data-i18n="operating"></span>
    </div>
  </div>
</div>

<div class="toolbar" id="toolbar">
  <div class="company-tabs" id="company-tabs"></div>
  <button class="create-btn" data-i18n="createBtn" onclick="openModal()">＋ 새 회사</button>
</div>

<!-- Approval Banner (shown when pending approvals exist) -->
<div class="approval-banner" id="approval-banner" style="display:none"></div>

<!-- Goals Bar (shown when company is selected) -->
<div class="goals-bar" id="goals-bar"></div>

<div id="empty-state" class="empty-state" style="display:none">
  <div class="emoji">🏢</div>
  <p data-i18n="emptyTitle"></p>
  <p class="hint" data-i18n="emptyHint"></p>
  <button class="create-btn" style="margin-top:20px;font-size:14px;padding:10px 28px" data-i18n="emptyBtn" onclick="openModal()">＋ 새 회사 만들기</button>
</div>

<div class="main" id="main-content" style="display:none">
  <!-- Left: Org panel -->
  <div class="panel">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="panel-title" data-i18n="orgTitle" style="margin:0">👥 조직</div>
      <button class="add-agent-btn" onclick="openAgentModal()" title="에이전트 추가">＋</button>
    </div>
    <div id="org-list" style="overflow-y:auto;flex:1"></div>
    <div class="cost-footer" id="cost-footer" style="display:none">
      <span>💰 총 비용</span>
      <span class="cost-total" id="total-cost">$0.00</span>
    </div>
  </div>

  <!-- Center: Chat panel -->
  <div class="panel chat-panel">
    <div class="panel-title" id="chat-title" style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="activeAgentFilter=null;renderPanels()">💬 소통</div>
    <div class="mentions" id="mentions"></div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="typing" id="typing"><div class="td"><span></span><span></span><span></span></div> <span id="typing-who">...</span></div>
    <div class="chat-input-area">
      <input class="chat-input" id="chat-input" data-i18n-ph="chatPlaceholder" placeholder="@멘션으로 에이전트에게 지시" />
      <button class="chat-send" id="chat-send" data-i18n="send" onclick="sendChat()">전송</button>
    </div>
  </div>

  <!-- Right: Kanban + Recurring Tasks tabs -->
  <div class="panel">
    <div class="right-tabs">
      <button class="right-tab" onclick="switchRightTab('kanban')">📋 대기열</button>
    <button class="right-tab" onclick="switchRightTab('approvals')">🔔 승인</button>
    <button class="right-tab" onclick="switchRightTab('history')">📜 연혁</button>
    <button class="right-tab" onclick="switchRightTab('recurring')">🔄 정기</button>

<script>
const UI = {
  ko:{createBtn:'＋ 새 회사',emptyTitle:'아직 회사가 없습니다',emptyHint:'아래 버튼을 눌러 AI 회사를 시작하세요',emptyBtn:'＋ 새 회사 만들기',modalTitle:'🏢 새 회사 만들기',nameLabel:'회사명 / 프로젝트명',topicLabel:'주제 / 목표',langLabel:'언어 / Language',cancel:'취소',submit:'생성',orgTitle:'👥 조직',chatTitle:'💬 소통',taskTitle:'📌 작업',logTitle:'📋 로그',operating:'운영 중',chatPlaceholder:'@멘션으로 에이전트에게 지시',send:'전송',namePh:'예: O2O 마케팅 프로젝트',topicPh:'예: 온라인 비즈니스, 웹 서비스 개발...'},
  en:{createBtn:'＋ New Company',emptyTitle:'No companies yet',emptyHint:'Click below to start your first AI company',emptyBtn:'＋ Create Company',modalTitle:'🏢 Create New Company',nameLabel:'Company / Project Name',topicLabel:'Topic / Goal',langLabel:'Language',cancel:'Cancel',submit:'Create',orgTitle:'👥 Team',chatTitle:'💬 Chat',taskTitle:'📌 Tasks',logTitle:'📋 Log',operating:'Running',chatPlaceholder:'@mention an agent to instruct',send:'Send',namePh:'e.g. Marketing Campaign',topicPh:'e.g. E-commerce, Web Development...'},
  ja:{createBtn:'＋ 新規作成',emptyTitle:'まだ会社がありません',emptyHint:'下のボタンを押してAI会社を始めましょう',emptyBtn:'＋ 会社を作成',modalTitle:'🏢 新規会社を作成',nameLabel:'会社名 / プロジェクト名',topicLabel:'テーマ / 目標',langLabel:'言語',cancel:'キャンセル',submit:'作成',orgTitle:'👥 組織',chatTitle:'💬 チャット',taskTitle:'📌 タスク',logTitle:'📋 ログ',operating:'稼働中',chatPlaceholder:'@メンションでエージェントに指示',send:'送信',namePh:'例: マーケティングプロジェクト',topicPh:'例: EC運営, Web開発...'},
  zh:{createBtn:'＋ 新建公司',emptyTitle:'还没有公司',emptyHint:'点击下方按钮开始您的AI公司',emptyBtn:'＋ 创建公司',modalTitle:'🏢 创建新公司',nameLabel:'公司名 / 项目名',topicLabel:'主题 / 目标',langLabel:'语言',cancel:'取消',submit:'创建',orgTitle:'👥 团队',chatTitle:'💬 沟通',taskTitle:'📌 任务',logTitle:'📋 日志',operating:'运行中',chatPlaceholder:'@提及代理发送指令',send:'发送',namePh:'例: 营销项目',topicPh:'例: 电商运营, 网站开发...'}
};
const FLAGS={ko:'🇰🇷',en:'🇺🇸',ja:'🇯🇵',zh:'🇨🇳'};
let currentLang = localStorage.getItem('hub-lang') || 'ko';
let companies=[],currentCompany=null,lastChatLen=0;
let currentRightTab='kanban';
let cachedCosts=null;
let cachedApprovals=[];
let cachedGoals=[];
let cachedBoardTasks=[];
let cachedDeliverables=[];

function t(k){return (UI[currentLang]||UI.ko)[k]||k}

function renderLangSwitch(){
  document.getElementById('lang-switch').innerHTML = ['ko','en','ja','zh'].map(l=>
    `<button class="lang-btn ${l===currentLang?'active':''}" onclick="switchLang('${l}')">${FLAGS[l]}</button>`
  ).join('');
}

function switchLang(lang){
  currentLang=lang;
  localStorage.setItem('hub-lang',lang);
  renderLangSwitch();
  applyLang();
}

function applyLang(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(UI[currentLang][k]) el.textContent=UI[currentLang][k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const k=el.getAttribute('data-i18n-ph');
    if(UI[currentLang][k]) el.placeholder=UI[currentLang][k];
  });
  if(currentCompany){
    document.getElementById('chat-title').textContent=t('chatTitle');
  }
}

async function load(){
  const res=await fetch('/api/companies');companies=await res.json();renderTabs();
  if(!companies.length){
    document.getElementById('empty-state').style.display='';
    document.getElementById('main-content').style.display='none';
    document.getElementById('approval-banner').style.display='none';
    document.getElementById('goals-bar').className='goals-bar';
  }else{
    document.getElementById('empty-state').style.display='none';
    document.getElementById('main-content').style.display='';
    if(!currentCompany||!companies.find(c=>c.id===currentCompany)) selectCompany(companies[0].id);
    else refreshCompany();
  }
}

function renderTabs(){
  document.getElementById('company-tabs').innerHTML=companies.map(c=>
    `<div class="company-tab ${c.id===currentCompany?'active':''}" onclick="selectCompany('${c.id}')"><span class="dot"></span>${c.name}<span class="tab-close" onclick="event.stopPropagation();deleteCompany('${c.id}','${c.name}')" title="삭제">✕</span></div>`
  ).join('');
}

async function selectCompany(cid){
  currentCompany=cid;lastChatLen=0;renderTabs();
  activeAgentFilter=null;
  await refreshCompany();
}

async function refreshCompany(){
  if(!currentCompany)return;
  const res=await fetch(`/api/company/${currentCompany}`);const c=await res.json();
  document.getElementById('chat-messages').innerHTML='';
  renderCompanyUI(c);
  if(c.chat)c.chat.forEach(m=>appendChat(m));
  lastChatLen=(c.chat||[]).length;
  // Fetch extra data
  fetchExtras();
}

// Fetch goals, board tasks, costs, approvals
async function fetchExtras(){
  if(!currentCompany)return;
  try{
    const [goalsRes,btRes,costsRes,apprRes,delRes]=await Promise.all([
      fetch(`/api/goals/${currentCompany}`),
      fetch(`/api/board-tasks/${currentCompany}`),
      fetch(`/api/costs/${currentCompany}`),
      fetch(`/api/approvals/${currentCompany}?status=pending`),
      fetch(`/api/deliverables/${currentCompany}`)
    ]);
    cachedGoals=await goalsRes.json();
    cachedBoardTasks=await btRes.json();
    cachedCosts=await costsRes.json();
    cachedApprovals=await apprRes.json();
    cachedDeliverables=await delRes.json();
    renderGoals();
    renderKanban();
    renderCosts();
    renderApprovals();
    renderDeliverables();
    renderHistory();
  }catch(e){console.warn('fetchExtras error',e)}
}

function renderCompanyUI(c){
  document.getElementById('chat-title').textContent=t('chatTitle');
  document.getElementById('mentions').innerHTML=c.agents.map(a=>
    `<div class="mention-btn" onclick="insertMention('${a.name}')">${a.emoji} @${a.name}</div>`
  ).join('');
  document.getElementById('org-list').innerHTML=c.agents.map(a=>{
    const tasks=a.tasks||[],done=tasks.filter(t=>t.status==='completed').length,total=tasks.length;
    const prog=total?Math.round(done/total*100):0,hasActive=tasks.some(t=>t.status==='in-progress');
    const cls=a.status==='registering'?'registering':a.status==='idle'?'idle':a.status==='working'?'working':hasActive?'working':'active';
    const lbl=cls==='registering'?'⏳ 생성 중...':cls==='working'?'🔄 작업중':cls==='active'?'🟢 활성':'⏳ 대기';
    const dis=a.status==='registering'?'pointer-events:none;opacity:.6':'';
    const isFiltered=activeAgentFilter&&activeAgentFilter.id===a.id;
    const border=isFiltered?'border:1px solid var(--accent)':'';
    // Cost display
    const costData=a.cost||{};
    const costVal=costData.total_cost||0;
    const costHtml=costVal>0?`<div class="agent-cost">💰 <span class="cost-val">$${costVal.toFixed(4)}</span></div>`:'';
    return `<div class="agent-card ${cls}" style="${dis};cursor:pointer;${border}" onclick="filterAgentChat('${a.id}','${a.name}','${a.emoji}')"><div class="agent-top"><span class="agent-emoji">${a.emoji}</span><span class="agent-name">${a.name}</span><span class="agent-tag ${cls}" style="margin-left:auto">${lbl}</span><span style="font-size:11px;color:var(--dim);cursor:pointer;margin-left:2px" onclick="event.stopPropagation();reactivateAgent('${currentCompany}','${a.id}','${a.emoji} ${a.name}')" title="재활성화">🔄</span><span style="font-size:11px;color:var(--dim);cursor:pointer;margin-left:2px" onclick="event.stopPropagation();deleteAgent('${currentCompany}','${a.id}','${a.emoji} ${a.name}')" title="삭제">✕</span></div><div class="agent-role">${a.role}</div><div class="agent-meta"><span>${done}/${total}</span></div>${costHtml}${total?`<div class="pbar"><div class="pfill" style="width:${prog}%"></div></div>`:''}</div>`;
  }).join('');
  // Recurring tasks (right tab)
  const allTasks=c.agents.flatMap(a=>(a.tasks||[]).map(t=>({...t,agent:a})));
  const rtasks=c.recurring_tasks||[];
  let taskHtml='';
  if(rtasks.length){
    taskHtml=rtasks.map(t=>{
      const s=t.status==='running'?'🔄 실행 중':t.status==='paused'?'⏸️ 대기':'⏹️ 중지';
      const lastR=t.last_run?new Date(t.last_run).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'—';
      const nextR=t.next_run?new Date(t.next_run).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'—';
      const lastResult=t.results&&t.results.length?t.results[t.results.length-1].text:'';
      const intLbl=t.interval_minutes>=1440?`${Math.round(t.interval_minutes/1440)}일`:t.interval_minutes>=60?`${t.interval_minutes/60}시간`:`${t.interval_minutes}분`;
      let btns='';
      if(t.status==='running') btns=`<button class="rtask-btn" onclick="taskAction('pause','${t.id}')">⏸ 대기</button><button class="rtask-btn" onclick="taskAction('stop','${t.id}')">⏹ 중지</button>`;
      else if(t.status==='paused') btns=`<button class="rtask-btn" onclick="taskAction('resume','${t.id}')">▶ 재개</button><button class="rtask-btn" onclick="taskAction('stop','${t.id}')">⏹ 중지</button>`;
      btns+=`<button class="rtask-btn" style="margin-left:auto;color:#ef4444;border-color:#7f1d1d" onclick="deleteTask('${t.id}','${t.title.replace(/'/g,"\\'")}')">🗑 삭제</button>`;
      return `<div class="rtask-card ${t.status}"><div class="rtask-top"><span>${t.agent_emoji}</span><span class="rtask-title" title="${t.title}">${t.title}</span><span class="rtask-status">${s}</span></div><div class="rtask-meta">${intLbl}마다 · 마지막: ${lastR} · 다음: ${nextR}</div>${lastResult?`<div class="rtask-result" title="${lastResult.replace(/"/g,'&quot;')}">💬 ${lastResult}</div>`:''}<div class="rtask-actions">${btns}</div></div>`;
    }).join('');
  } else {
    taskHtml=`<div style="color:var(--dim);text-align:center;padding:14px;font-size:10px">정기 작업 없음<br><span style="font-size:9px">채팅에서 "모니터링", "정기적" 등으로 자동 생성</span></div>`;
  }
  document.getElementById('task-list').innerHTML=taskHtml;
}

// ─── Goals Rendering ───
function renderGoals(){
  const bar=document.getElementById('goals-bar');
  if(!currentCompany){bar.className='goals-bar';return;}
  bar.className='goals-bar show';
  const goals=cachedGoals||[];
  let html=`<div class="goals-header"><div class="panel-title" style="margin:0">🎯 목표</div><button class="add-agent-btn" style="width:20px;height:20px;font-size:13px" onclick="toggleGoalForm()" title="목표 추가">＋</button></div>`;
  html+=`<div class="goals-list">`;
  goals.forEach(g=>{
    const prog=computeGoalProgress(g);
    html+=`<div class="goal-card"><button class="goal-del" onclick="deleteGoal('${g.id}')" title="삭제">✕</button><div class="goal-title" title="${g.title}">${g.title}</div><div class="goal-progress"><div class="goal-pfill" style="width:${prog}%"></div></div><div class="goal-meta"><span>${prog}% 완료</span><span>${(g.task_ids||[]).length}개 작업</span></div></div>`;
  });
  html+=`<div class="goal-inline-form" id="goal-form" style="display:none"><input id="goal-title-input" placeholder="목표명 입력..." onkeydown="if(event.key==='Enter')addGoal()"/><button class="cancel-btn" onclick="toggleGoalForm()">취소</button><button class="kf-ok" onclick="addGoal()">추가</button></div>`;
  html+=`</div>`;
  bar.innerHTML=html;
  updateMainHeight();
}

function computeGoalProgress(goal){
  const tasks=cachedBoardTasks||[];
  const ids=goal.task_ids||[];
  if(!ids.length)return 0;
  const linked=tasks.filter(t=>ids.includes(t.id));
  if(!linked.length)return 0;
  const done=linked.filter(t=>t.status==='완료').length;
  return Math.round(done/linked.length*100);
}

function toggleGoalForm(){
  const f=document.getElementById('goal-form');
  if(!f)return;
  if(f.style.display==='none'){f.style.display='flex';document.getElementById('goal-title-input').focus();}
  else{f.style.display='none';}
}

async function addGoal(){
  const input=document.getElementById('goal-title-input');
  const title=input.value.trim();
  if(!title)return;
  input.value='';
  try{
    const res=await fetch(`/api/goal-add/${currentCompany}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,task_ids:[]})});
    const data=await res.json();
    if(data.ok){toast(`🎯 목표 "${title}" 추가됨`);cachedGoals.push(data.goal);renderGoals();}
    else toast('목표 추가 실패');
  }catch(e){toast('목표 추가 실패')}
}

async function deleteGoal(goalId){
  if(!confirm('이 목표를 삭제하시겠습니까?'))return;
  try{
    const res=await fetch(`/api/goal-delete/${currentCompany}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal_id:goalId})});
    const data=await res.json();
    if(data.ok){toast('🗑 목표 삭제됨');cachedGoals=cachedGoals.filter(g=>g.id!==goalId);renderGoals();}
  }catch(e){toast('삭제 실패')}
}

// ─── Kanban Board ───
let kanbanFormVisible=false;

function renderKanban(){
  const board=document.getElementById('kanban-board');
  if(!board)return;
  const tasks=cachedBoardTasks||[];
  const company=companies.find(c=>c.id===currentCompany);
  const agents=company?company.agents:[];
  const sorted=[...tasks].sort((a,b)=>{
    const order={'진행중':0,'대기':1,'완료':2};
    return (order[a.status]||3)-(order[b.status]||3);
  });

  const titleCls=s=>s==='완료'?'task-title done-title':'task-title';

  function agentName(aid){const a=agents.find(x=>x.id===aid);return a?`${a.emoji} ${a.name}`:'';}

  board.innerHTML=`<div style="max-height:100%;overflow-y:auto;padding-right:4px"><table class="task-table">
    <thead><tr><th>작업</th><th>담당</th><th>상태</th><th></th></tr></thead>

      <td class="${titleCls(t.status)}" title="${t.title}">${t.title}</td>
      <td class="task-agent">${agentName(t.agent_id)}</td>
      <td class="task-status ${statusCls(t.status)}">${statusIcon(t.status)}</td>

  <div class="task-add-row">
    <input id="bt-title" placeholder="새 작업..." onkeydown="if(event.key==='Enter')addBoardTask()"/>
    <select id="bt-agent"><option value="">담당</option>${agents.map(a=>`<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('')}</select>

async function cycleTaskStatus(taskId,newStatus){
  try{
    const res=await fetch(`/api/task-status/${currentCompany}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:taskId,status:newStatus})});
    const data=await res.json();
    if(data.ok){
      // Update cached
      const idx=cachedBoardTasks.findIndex(t=>t.id===taskId);
      if(idx>=0)cachedBoardTasks[idx].status=newStatus;
      if(data.unlocked&&data.unlocked.length){
        data.unlocked.forEach(u=>{
          const ui=cachedBoardTasks.findIndex(t=>t.id===u.id);
          if(ui>=0)cachedBoardTasks[ui].status=u.status;
        });
        toast(`🔗 ${data.unlocked.length}개 작업 자동 시작`);
      }
      renderKanban();
      renderGoals(); // goals depend on task completion
    }
  }catch(e){toast('상태 변경 실패')}
}

function mdToHtml(text){
  let h=text.replace(/(?:^|\n)((?:\|[^\n]+\|\n)+)/g,(match,table)=>{
    const rows=table.trim().split('\n').filter(r=>r.trim());
    if(rows.length<2)return match;
    let html='<table>';
    rows.forEach((row,i)=>{
      const cells=row.split('|').filter(c=>c.trim()!=='').map(c=>c.trim());
      const tag=i===0?'th':'td';
      html+='<tr>'+cells.map(c=>`<${tag}>${c}</${tag}>`).join('')+'</tr>';
    });
    html+='</table>';return '\n'+html+'\n';
  });
  h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
  return h;
}

const MAX_VISIBLE_MESSAGES=50;

function appendChat(m){
  const el=document.getElementById('chat-messages'),isUser=m.type==='user',isSystem=m.type==='system';
  if(isSystem){
    el.innerHTML+=`<div style="text-align:center;padding:8px;font-size:11px;color:var(--dim)">${(m.text||'')}</div>`;
    el.scrollTop=el.scrollHeight;return;
  }
  const avatar=isUser?'👤':(m.emoji||'👔');
  const text=m.text||'';
  const lines=text.split('\n');
  // 멘션 라인(@로 시작)과 일반 라인 분리 (```블록도 멘션으로 처리)
  const normalLines=[],mentionLines=[];
  let i=0;
  while(i<lines.length){
    const trimmed=lines[i].trim();
    if(trimmed && trimmed.startsWith('@')){
      // @AGENT 뒤에 ```가 같은 라인에 있으면 블록 멘션
      const blockMatch=trimmed.match(/^@(\S+)\s*```/);
      if(blockMatch){
        let blockContent='';
        i++;
        while(i<lines.length && !lines[i].trim().startsWith('```')){
          blockContent+=lines[i]+'\n';
          i++;
        }
        if(i<lines.length) i++; // 닫는 ``` 스킵
        mentionLines.push(trimmed+'\n'+blockContent);
        continue;
      }
      mentionLines.push(trimmed);
    } else {
      normalLines.push(lines[i]);
    }
    i++;
  }
  const normalText=normalLines.join('\n').trim();
  // 일반 텍스트가 있으면 일반 버블로
  if(normalText){
    const bodyHtml=mdToHtml(normalText);
    el.innerHTML+=`<div class="chat-msg ${isUser?'user':'agent'}"><div class="avatar">${avatar}</div><div class="chat-body"><div class="chat-sender">${m.from}</div><div class="chat-bubble">${bodyHtml}</div></div></div>`;
  }
  // 멘션 라인 각각 별도 카드로 (FROM → TO 형식)
  for(const ml of mentionLines){
    const targets=ml.match(/@(\w+)/g)||[];
    let content=ml;
    // @제거 후 내용 추출
    content=content.replace(/@\w+\s*/g,'').trim();
    if(content.startsWith('"')&&content.endsWith('"')) content=content.slice(1,-1).trim();
    const targetHtml=targets.map(t=>`<span class="mention-target">${t}</span>`).join('<span class="mention-arrow">↓</span>');
    const bodyHtml=mdToHtml(content);
    el.innerHTML+=`<div class="chat-msg mention-msg"><span class="mention-from">${avatar}</span><span class="mention-arrow">↓</span>${targetHtml}${content?`<div class="mention-sep">|</div><div class="mention-body">${bodyHtml}</div>`:''}</div>`;
  }
  // 멘션도 일반도 없으면 원본 통째로
  if(!normalText && mentionLines.length===0){
    const bodyHtml=mdToHtml(text);
    el.innerHTML+=`<div class="chat-msg ${isUser?'user':'agent'}"><div class="avatar">${avatar}</div><div class="chat-body"><div class="chat-sender">${m.from}</div><div class="chat-bubble">${bodyHtml}</div></div></div>`;
  }
  el.scrollTop=el.scrollHeight;
}

function renderPanels(){
  const company=companies.find(c=>c.id===currentCompany);
  if(!company)return;
  const chatEl=document.getElementById('chat-messages');
  const taskEl=document.getElementById('task-list');
  const titleEl=document.getElementById('chat-title');
  if(activeAgentFilter){
    titleEl.innerHTML=`<span onclick="activeAgentFilter=null;renderPanels()" style="cursor:pointer" title="전체 보기">💬 ${activeAgentFilter.emoji} ${activeAgentFilter.name}</span><span style="font-size:10px;color:var(--dim);margin-left:auto" title="클릭하면 전체 보기">← 전체</span>`;
  } else {
    titleEl.innerHTML=`<span>💬 소통</span>`;
  }
  chatEl.innerHTML='';
  if(activeAgentFilter){
    const isCEO=activeAgentFilter.id==='ceo';
    const filtered=(company.chat||[]).filter(m=>{
      if(!m.from)return false;
      if(m.type==='system')return true;
      if(m.type==='user')return isCEO;
      return m.from.toLowerCase()===activeAgentFilter.name.toLowerCase();
    });
    chatEl.innerHTML+=`<div style="text-align:center;padding:6px;font-size:10px;color:var(--accent);cursor:pointer;background:var(--card);border-radius:6px;margin-bottom:4px" onclick="activeAgentFilter=null;renderPanels()">🔍 ${activeAgentFilter.emoji} ${activeAgentFilter.name} 필터링 중 — 클릭하면 전체 보기</div>`;
    if(filtered.length===0) chatEl.innerHTML+=`<div style="text-align:center;padding:20px;color:var(--dim);font-size:11px">메시지 없음</div>`;
    else filtered.forEach(m=>appendChat(m));
  } else {
    if(company.chat){
      const all=company.chat;
      if(all.length>MAX_VISIBLE_MESSAGES){
        chatEl.innerHTML+=`<div style="text-align:center;padding:6px;font-size:10px;color:var(--dim);background:var(--card);border-radius:6px;margin-bottom:4px">📜 최근 ${MAX_VISIBLE_MESSAGES}개만 표시 (전체 ${all.length}개)</div>`;
        all.slice(-MAX_VISIBLE_MESSAGES).forEach(m=>appendChat(m));
      } else {
        all.forEach(m=>appendChat(m));
      }
    }
  }
  lastChatLen=(company.chat||[]).length;
  const allTasks=company.recurring_tasks||[];
  let taskHtml='';
  const filteredTasks=activeAgentFilter?allTasks.filter(t=>t.agent_id===activeAgentFilter.id):allTasks;
  if(filteredTasks.length){
    taskHtml=filteredTasks.map(t=>{
      const s=t.status==='running'?'🔄 실행 중':t.status==='paused'?'⏸️ 대기':'⏹️ 중지';
      const lastR=t.last_run?new Date(t.last_run).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'—';
      const nextR=t.next_run?new Date(t.next_run).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}):'—';
      const lastResult=t.results&&t.results.length?t.results[t.results.length-1].text:'';
      const intLbl=t.interval_minutes>=1440?`${Math.round(t.interval_minutes/1440)}일`:t.interval_minutes>=60?`${t.interval_minutes/60}시간`:`${t.interval_minutes}분`;
      let btns='';
      if(t.status==='running') btns=`<button class="rtask-btn" onclick="taskAction('pause','${t.id}')">⏸ 대기</button><button class="rtask-btn" onclick="taskAction('stop','${t.id}')">⏹ 중지</button>`;
      else if(t.status==='paused') btns=`<button class="rtask-btn" onclick="taskAction('resume','${t.id}')">▶ 재개</button><button class="rtask-btn" onclick="taskAction('stop','${t.id}')">⏹ 중지</button>`;
      btns+=`<button class="rtask-btn" style="margin-left:auto;color:#ef4444;border-color:#7f1d1d" onclick="deleteTask('${t.id}','${t.title.replace(/'/g,"\\'")}')">🗑 삭제</button>`;
      return `<div class="rtask-card ${t.status}"><div class="rtask-top"><span>${t.agent_emoji}</span><span class="rtask-title" title="${t.title}">${t.title}</span><span class="rtask-status">${s}</span></div><div class="rtask-meta">${intLbl}마다 · 마지막: ${lastR} · 다음: ${nextR}</div>${lastResult?`<div class="rtask-result" title="${lastResult.replace(/"/g,'&quot;')}">💬 ${lastResult}</div>`:''}<div class="rtask-actions">${btns}</div></div>`;
    }).join('');
  } else {
    taskHtml=`<div style="color:var(--dim);text-align:center;padding:14px;font-size:10px">${activeAgentFilter?'할당된 정기 작업 없음':'정기 작업 없음<br><span style="font-size:9px">채팅에서 "모니터링", "정기적" 등으로 자동 생성</span>'}</div>`;
  }
  taskEl.innerHTML=taskHtml;
}

async function reactivateAgent(cid,aid,label){
  if(!confirm(`"${label}"을 재활성화하시겠습니까?\n\n⚠️ 세션만 초기화되며, 대화 내용과 작업은 유지됩니다.`))return;
  const t=toastLoading(`"${label}" 재활성화 중...`);
  try{
    const res=await fetch(`/api/agent-reactivate/${cid}/${aid}`,{method:'POST'});
    const data=await res.json();
    if(data.ok){toastDone(t,`"${label}" 재활성화 완료`);refreshCompany()}
    else toastDone(t,'재활성화 실패: '+(data.error||''))
  }catch(e){toastDone(t,'재활성화 실패')}
}

async function addAgent(){
  const name=document.getElementById('a-name').value.trim();
  const role=document.getElementById('a-role').value.trim();
  const emoji=document.getElementById('a-emoji').value;
  const prompt=document.getElementById('a-prompt').value.trim();
  if(!name||!role){alert('이름과 역할을 입력하세요');return}
  const btn=document.getElementById('btn-agent');btn.classList.add('loading');
  const t=toastLoading(`"${name}" 에이전트 생성 중...`);
  const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),30000);
  try{
  const res=await fetch(`/api/agent-add/${currentCompany}`,{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,role,emoji,prompt}),signal:controller.signal
  });
  clearTimeout(timer);
  const data=await res.json();
  if(data.ok){toastDone(t,`"${emoji} ${name}" 에이전트가 합류했습니다!`);closeAgentModal();refreshCompany();document.getElementById('a-name').value='';document.getElementById('a-role').value='';document.getElementById('a-prompt').value='';document.getElementById('a-emoji').value='🤖'}
  else if(data.pending_approval){toastDone(t,'승인 대기 중: '+data.message);closeAgentModal()}
  else toastDone(t,'에이전트 생성 실패')
  }catch(e){clearTimeout(timer);toastDone(t,'에이전트 생성 실패: '+e.message)}
  finally{btn.classList.remove('loading')}
}

async function createCompany(){
  const name=document.getElementById('m-name').value.trim(),topic=document.getElementById('m-topic').value.trim();
  if(!name||!topic){alert('Enter name and topic');return}
  const btn=document.getElementById('btn-create');btn.classList.add('loading');
  const t=toastLoading(`"${name}" 회사 생성 중...`);
  const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),60000);
  try{
  const res=await fetch('/api/companies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,topic,lang:currentLang}),signal:controller.signal});
  clearTimeout(timer);
  const data=await res.json();
  if(data.ok){toastDone(t,`"${name}" 회사가 생성되었습니다!`);closeModal();currentCompany=data.company.id;lastChatLen=0;load()}
  else toastDone(t,'회사 생성 실패')
  }catch(e){clearTimeout(timer);toastDone(t,'회사 생성 실패: '+e.message)}
  finally{btn.classList.remove('loading')}
}

function openTaskModal(){
  if(!currentCompany)return;
  fetch(`/api/company/${currentCompany}`).then(r=>r.json()).then(c=>{
    const sel=document.getElementById('t-agent');
    sel.innerHTML=c.agents.map(a=>`<option value="${a.id}">${a.emoji} ${a.name}</option>`).join('');
  });
  document.getElementById('task-modal').classList.add('show');
}
function closeTaskModal(){document.getElementById('task-modal').classList.remove('show')}

async function addTask(){
  const agent_id=document.getElementById('t-agent').value;
  const title=document.getElementById('t-title').value.trim();
  const prompt=document.getElementById('t-prompt').value.trim();
  const interval=parseInt(document.getElementById('t-interval').value);
  if(!title||!prompt){alert('제목과 프롬프트를 입력하세요');return}
  const btn=document.getElementById('btn-task');btn.classList.add('loading');
  try{
    const res=await fetch(`/api/task-add/${currentCompany}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,prompt,interval_minutes:interval,agent_id})});
    const data=await res.json();
    if(data.ok){toast(`🔄 "${title}" 작업이 생성되었습니다`);closeTaskModal();document.getElementById('t-title').value='';document.getElementById('t-prompt').value='';refreshCompany()}
    else toast('작업 생성 실패')
  }catch(e){toast('작업 생성 실패')}
  finally{btn.classList.remove('loading')}
}

async function taskAction(action,taskId){
  const endpoint=action==='pause'?'task-pause':action==='resume'?'task-resume':'task-stop';
  try{
    await fetch(`/api/${endpoint}/${currentCompany}/${taskId}`,{method:'POST'});
    refreshCompany();
  }catch(e){toast('작업 상태 변경 실패')}
}

async function deleteTask(taskId,title){
  if(!confirm(`"${title}" 작업을 삭제하시겠습니까?`))return;
  try{
    const res=await fetch(`/api/task-delete/${currentCompany}/${taskId}`,{method:'POST'});
    if(res.ok){toast(`🗑 "${title}" 삭제됨`);refreshCompany()}
  }catch(e){toast('삭제 실패')}
}

renderLangSwitch();applyLang();load();

// SSE for real-time updates
function renderHistory(){
  const panel=document.getElementById('history-panel');
  if(!panel||!currentCompany)return;
  const c=companies.find(x=>x.id===currentCompany);
  if(!c)return;
  const log=(c.activity_log||[]).filter(e=>e.agent==='COO'||e.agent==='시스템');
  if(!log.length){panel.innerHTML='<div style="padding:20px;color:var(--dim);font-size:11px;text-align:center">📜 아직 연혁이 없습니다<br><span style="font-size:10px">COO가 정기적으로 작성합니다</span></div>';return;}
  let html='<div style="padding:4px 0;overflow-y:auto;max-height:100%">';
  const recent=log.slice(-30).reverse();
  recent.forEach(e=>{
    const time=e.time||'';
    const text=(e.text||'').substring(0,150);
    html+=`<div style="padding:5px 8px;border-bottom:1px solid var(--border);font-size:10px"><div style="display:flex;justify-content:space-between"><span style="color:var(--dim)">${time}</span><span style="color:#a78bfa;font-weight:600">${e.agent}</span></div><div style="color:var(--text);margin-top:2px;line-height:1.3">${text}</div></div>`;
  });
  html+='</div>';
  panel.innerHTML=html;
}

let sseReconnectTimer=null;
function syncCurrentCompanyChatLen(){
  if(!currentCompany)return;
  const company=companies.find(c=>c.id===currentCompany);
  if(company)lastChatLen=(company.chat||[]).length;
}

function connectSSE(){
  if(sseReconnectTimer){
    clearTimeout(sseReconnectTimer);
    sseReconnectTimer=null;
  }
  const es=new EventSource('/api/sse');
  es.addEventListener('init',e=>{
    const data=JSON.parse(e.data);
    if(!data)return;
    companies=data;
    renderTabs();
    syncCurrentCompanyChatLen();
  });
  es.addEventListener('company_update',e=>{
    const data=JSON.parse(e.data);
    if(!data.company||!data.id)return;
    const c=data.company;
    const idx=companies.findIndex(c2=>c2.id===data.id);
    const prev=idx>=0?companies[idx]:null;
    if(idx>=0)companies[idx]=c;
    else companies.push(c);
    renderTabs();

    if(data.id!==currentCompany)return;

    const chat=c.chat||[];
    const chatLen=chat.length;
    const oldAgents=prev?JSON.stringify(prev.agents||[]):'';
    const newAgents=JSON.stringify(c.agents||[]);
    const agentsChanged=oldAgents!==newAgents;
    const shouldRenderPanels=!!activeAgentFilter;
    const canAppendIncrementally=!agentsChanged&&!shouldRenderPanels;
    const newMsgs=canAppendIncrementally?chat.slice(lastChatLen):[];

    if(agentsChanged)renderCompanyUI(c);

    if(canAppendIncrementally&&newMsgs.length>0){
      // Remove oldest if over limit
      const chatEl=document.getElementById('chat-messages');
      while(chatEl.children.length>MAX_VISIBLE_MESSAGES+5) chatEl.removeChild(chatEl.firstChild);
      newMsgs.forEach(m=>appendChat(m));
    }else if(agentsChanged||shouldRenderPanels){
      renderPanels();
    }

    lastChatLen=chatLen;
    if((canAppendIncrementally?newMsgs:chat).some(m=>m.type==='agent')) document.getElementById('typing').classList.remove('show');
    // working 에이전트 표시
    const working=(c.agents||[]).filter(a=>a.status==='working').map(a=>`${a.emoji} ${a.name}`);
    const typingEl=document.getElementById('typing');
    const whoEl=document.getElementById('typing-who');
    if(working.length>0){
      typingEl.classList.add('show');
      whoEl.textContent=working.join(', ')+' 입력 중...';
    }else if(!newMsgs.some(m=>m.type==='agent')){
      typingEl.classList.remove('show');
    }
    fetchExtras();
  });
  es.onerror=()=>{
    es.close();
    sseReconnectTimer=setTimeout(connectSSE,3000);
  };
}
connectSSE();
